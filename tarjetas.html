<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Diseña y comparte tu tarjeta bíblica</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to bottom, #fffef5, #fff8e1);
      font-family: 'Roboto', sans-serif;
    }

    h1 {
      font-family: 'Playfair Display', serif;
    }

    #topbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 55px;
      background: rgba(255, 248, 225, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    #home-btn {
      font-size: 1.4rem;
      color: #5a3d00;
    }

    #tarjeta-container {
      position: relative;
      max-width: 90%;
      margin: 80px auto 20px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
    }

    #cita-overlay {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      color: #DAA520;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
      white-space: pre-line;
    }

    .versiculo-btn {
      background: #fff8e1;
      border: 2px solid #d4af37;
      padding: 10px;
      border-radius: 10px;
      width: 100%;
      text-align: left;
      margin-bottom: 8px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body class="flex flex-col items-center p-4">

  <!-- HEADER -->
  <div id="topbar">
    <div style="font-weight:600;">Tarjetas Bíblicas</div>
    <a id="home-btn" href="https://palabradelpadre.github.io">
      <i class="bi bi-house-fill"></i>
    </a>
  </div>

  <h1 class="text-4xl text-center mt-16 text-yellow-700">
    Diseña y comparte tu tarjeta
  </h1>

  <!-- LISTA -->
  <div id="lista-versiculos" class="w-full max-w-2xl mt-4"></div>

  <!-- TARJETA -->
  <div id="tarjeta-container">
    <img src="https://palabradelpadre.github.io/pascua3.png" class="img-fluid">
    <div id="cita-overlay">Selecciona un versículo</div>
  </div>

  <!-- BOTONES -->
  <div class="text-center mt-4">

    <button id="apoya-btn" class="btn btn-warning w-48">
      Apoya y Descarga
    </button>

    <button id="descarga-btn" class="btn btn-primary w-48 hidden">
      Descargar Tarjeta
    </button>

    <p id="mensaje" class="mt-2 text-yellow-700 text-sm">
      Donación sugerida: $3 MXN
    </p>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    const versiculos = [
      { ref: "Jeremías 29,11", text: "Porque yo sé los planes que tengo para vosotros." },
      { ref: "Salmo 23,1", text: "El Señor es mi pastor, nada me falta." },
      { ref: "Filipenses 4,13", text: "Todo lo puedo en aquel que me fortalece." },
      { ref: "Juan 14,6", text: "Yo soy el camino, la verdad y la vida." },
      { ref: "Romanos 8,28", text: "Dios dispone todo para el bien de los que le aman." },
      { ref: "Mateo 11,28", text: "Venid a mí todos los cansados." },
      { ref: "Isaías 41,10", text: "No temas, porque yo estoy contigo." }
    ];

    const lista = document.getElementById('lista-versiculos');
    const overlay = document.getElementById('cita-overlay');
    const descargaBtn = document.getElementById('descarga-btn');
    const apoyaBtn = document.getElementById('apoya-btn');
    const mensaje = document.getElementById('mensaje');

    versiculos.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'versiculo-btn';
      btn.innerHTML = `<strong>${v.text}</strong><br><small>${v.ref}</small>`;
      btn.onclick = () => {
        overlay.textContent = `${v.text}\n${v.ref}`;
      };
      lista.appendChild(btn);
    });

    apoyaBtn.onclick = () => {
      window.open('https://www.paypal.com/paypalme/silenciodeSanJose', '_blank');

      mensaje.textContent = "El botón se desbloqueará en 5 segundos mientras realizas el donativo...";

      setTimeout(() => {
        descargaBtn.classList.remove('hidden');
        mensaje.textContent = "¡Ya puedes descargar tu tarjeta!";
      }, 5000);
    };

    descargaBtn.onclick = () => {
      html2canvas(document.getElementById('tarjeta-container')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'tarjeta.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    };
  </script>

</body>
</html>
