<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tarjeta de Misa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg,#1e293b,#0f172a);
  color:white;
}

.container{
  padding:20px;
  max-width:420px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
  font-size:18px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  font-size:15px;
}

.primary{
  background:#22c55e;
  color:white;
}

.share{
  background:#3b82f6;
  color:white;
}

.preview{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    ✝️ Mi Tarjeta de Misa
  </div>

  <div class="card">

    <input id="frase" placeholder="Frase que te llamó la atención">
    <input id="compromiso" placeholder="Compromiso personal">
    <textarea id="oracion" placeholder="Oración o intención"></textarea>

    <button class="primary" onclick="generar()">Crear tarjeta</button>

    <div id="preview" class="preview" style="display:none;"></div>

    <button class="share" onclick="compartir()">Compartir por WhatsApp</button>

  </div>

</div>

<script>
let texto = "";

function generar(){
  const f = document.getElementById("frase").value;
  const c = document.getElementById("compromiso").value;
  const o = document.getElementById("oracion").value;

  texto =
`✝️ Mi Tarjeta de Misa

📖 ${f}

🙏 ${c}

💛 ${o}

Hecho con Mi Tarjeta de Misa`;

  const preview = document.getElementById("preview");
  preview.style.display="block";
  preview.innerText = texto;
}

function compartir(){
  if(!texto){
    alert("Primero crea la tarjeta");
    return;
  }
  const url = "https://wa.me/?text=" + encodeURIComponent(texto);
  window.open(url,"_blank");
}
</script>

</body>
</html>
