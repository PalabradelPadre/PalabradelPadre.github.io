<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tarjeta de Misa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  font-family: sans-serif;
  margin:0;
  background: linear-gradient(135deg,#1e293b,#0f172a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:90%;
  max-width:420px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
  text-align:center;
  font-size:20px;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:12px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:999px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.preview{
  margin-top:15px;
  padding:15px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
}

.share{
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>✝️ Mi Tarjeta de Misa</h1>

    <input id="frase" placeholder="Frase de la homilía">
    <input id="compromiso" placeholder="Mi compromiso">
    <textarea id="oracion" placeholder="Oración o intención"></textarea>

    <button onclick="generar()">Crear tarjeta</button>

    <div class="preview" id="preview" style="display:none;"></div>

    <button class="share" onclick="compartir()">Compartir por WhatsApp</button>
  </div>

</div>

<script>
let textoFinal = "";

function generar(){
  const f = document.getElementById("frase").value;
  const c = document.getElementById("compromiso").value;
  const o = document.getElementById("oracion").value;

  textoFinal =
`✝️ Mi Tarjeta de Misa

📖 Frase:
${f}

🙏 Compromiso:
${c}

💛 Oración:
${o}`;

  document.getElementById("preview").style.display="block";
  document.getElementById("preview").innerText = textoFinal;
}

function compartir(){
  const url = "https://wa.me/?text=" + encodeURIComponent(textoFinal);
  window.open(url,"_blank");
}
</script>

</body>
</html>
