<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}
.card-glass {
  backdrop-filter: blur(10px);
  background-color: rgba(255,255,255,0.25);
  border-radius: 1rem;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 1.5rem;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card-glass:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
.share-btn { 
  width: 36px; height: 36px; 
  display:flex; align-items:center; justify-content:center; 
  border-radius:50%; 
  transition: transform 0.2s; 
  border: 1px solid rgba(255,255,255,0.5); 
  background-color: rgba(255,255,255,0.1);
}
.share-btn:hover { transform: scale(1.2); background-color: rgba(255,255,255,0.2); }
.highlight { background-color: yellow; color: black; font-weight: bold; }
.carousel-container {
  overflow-x: auto;
  display: flex;
  gap: 1rem;
  padding: 1rem;
  scroll-behavior: smooth;
}
.carousel-card {
  flex: 0 0 auto;
  width: 300px;
  font-size: 0.95rem;
}
.floating-btn {
  background-color: rgba(255,223,0,0.85);
  color: #3b1f5f;
  font-weight: bold;
  padding: 0.5rem 1rem;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  border: 1px solid rgba(0,0,0,0.2);
  cursor: pointer;
  transition: transform 0.2s;
}
.floating-btn:hover { transform: scale(1.05); }
.menu-option {
  padding: 0.5rem 1rem;
  border-radius: 0.75rem;
  border: 1px solid rgba(0,0,0,0.2);
  background-color: rgba(255,223,0,0.5);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: background 0.2s;
}
.menu-option:hover {
  background-color: rgba(255,223,0,0.7);
}
.modal-backdrop {
  position: fixed; inset:0; background: rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index:50;
}
.modal-content {
  background: rgba(255,255,255,0.95); color:black; border-radius:1rem; padding:2rem; max-width:400px; width:90%;
}
.modal-button { 
  background-color:#6b21a8; color:white; padding:0.5rem 1rem; border-radius:0.5rem; margin:0.5rem 0; display:block; text-align:center;
  text-decoration:none;
  transition: background 0.2s;
}
.modal-button:hover { background-color:#8b5cf6; }
</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

// Categorías
const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-600/50'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/50'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/50'},
  {id:'inspiracion', label:'Inspiración', icon:'bi-lightning-fill', color:'bg-green-400/50'},
  {id:'amor', label:'Amor al prójimo', icon:'bi-heart-fill', color:'bg-yellow-300/50'},
  {id:'fe', label:'Fe y Confianza', icon:'bi-star-fill', color:'bg-purple-400/50'},
  {id:'devocion', label:'Devoción', icon:'bi-book-fill', color:'bg-pink-400/50'},
  {id:'evangelio', label:'Evangelio', icon:'bi-calendar-event-fill', color:'bg-orange-400/50'}
];

// Normalize
function normalize(str){ return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase(); }

// Highlight
function highlightText(text, search){
  if(!search) return text;
  const words = normalize(search).split(' ').filter(Boolean);
  let result = text;
  words.forEach(word=>{
    const re = new RegExp(`(${word})`,'gi');
    result = result.replace(re,'<span class="highlight">$1</span>');
  });
  return e('span',{dangerouslySetInnerHTML:{__html:result}});
}

// App principal
function App() {
  const [cardsData, setCardsData] = React.useState([]);
  const [category, setCategory] = React.useState('todas');
  const [search, setSearch] = React.useState('');
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [modalAccomp, setModalAccomp] = React.useState(false);
  const [modalEvangelizar, setModalEvangelizar] = React.useState(false);

  React.useEffect(()=>{
    fetch('cards.json')
      .then(res=>res.json())
      .then(data=>setCardsData(data))
      .catch(err=>console.error('Error cargando JSON', err));
  },[]);

  React.useEffect(()=>{
    window.addEventListener('beforeinstallprompt', (e)=>{
      e.preventDefault();
      setInstallPrompt(e);
    });
  },[]);

  const handleInstall = async ()=>{ if(!installPrompt) return; installPrompt.prompt(); await installPrompt.userChoice; };

  let filteredCards = category==='todas'? cardsData : cardsData.filter(c=>normalize(c.categoria)===category);
  if(search){
    const words = normalize(search).split(' ').filter(Boolean);
    filteredCards = filteredCards.filter(c=>{
      const content = normalize(`${c.titulo} ${c.cita} ${c.reflexion} ${c.versiculo}`);
      return words.every(w=>content.includes(w));
    });
  }

  const carouselCards = cardsData.filter(c=>c.categoria==='evangelio');

  // Carousel automático
  const carouselRef = React.useRef();
  React.useEffect(()=>{
    if(!carouselRef.current) return;
    const container = carouselRef.current; let scrollPos=0;
    const interval = setInterval(()=>{
      scrollPos += 2;
      if(scrollPos>container.scrollWidth-container.clientWidth) scrollPos=0;
      container.scrollTo({left:scrollPos, behavior:'smooth'});
    },50);
    return ()=>clearInterval(interval);
  },[carouselRef]);

  return e('div',{className:'min-h-screen flex flex-col'},
    // Header
    e('header',{className:'flex justify-center items-center p-4 bg-gray-800 shadow relative'},
      e('h1',{className:'text-3xl font-bold flex items-center gap-2'}, 
        e('i',{className:'bi bi-book-fill text-yellow-400'}),'Palabra del Padre',e('i',{className:'bi bi-dove-fill text-white'}))
    ),
    // Search
    e('div',{className:'mx-4 my-2'},
      e('input',{type:'text', placeholder:'Busca por palabra, versículo o tema...', value:search, onChange:e=>setSearch(e.target.value), className:'w-full p-3 rounded-xl text-gray-900'})
    ),
    // Install
    installPrompt && e('div',{className:'text-center my-2'},
      e('button',{onClick:handleInstall,className:'bg-green-500 px-4 py-2 rounded shadow hover:bg-green-400'}, 'Instalar App 📲')
    ),
    // Carousel
    e('div',{ref:carouselRef,className:'carousel-container'},
      carouselCards.map((card,i)=>e(CarouselCard,{key:i,...card}))
    ),
    // Floating categories
    e(FloatingCategories,{categories,setCategory,category}),
    // Cards principales
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-4'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card, search}))
    ),
    // Footer con botones adicionales
    e('footer',{className:'text-center py-6 text-gray-300 flex flex-col gap-3 items-center'},
      e('button',{className:'floating-btn', onClick:()=>setModalEvangelizar(true)}, e('i',{className:'bi bi-bullhorn'}),'Evangelizar/Donar'),
      e('button',{className:'floating-btn', onClick:()=>setModalAccomp(true)}, e('i',{className:'bi bi-chat-dots-fill'}),'Acompañamiento'),
      'Gracias por apoyar esta herramienta de crecimiento espiritual.'
    ),
    // Modal Acompañamiento
    modalAccomp && e('div',{className:'modal-backdrop', onClick:()=>setModalAccomp(false)},
      e('div',{className:'modal-content', onClick:e=>e.stopPropagation()},
        e('h2',{className:'text-xl font-bold mb-2'},'Acompañamiento'),
        e('a',{href:'https://m.me/tu_pagina',target:'_blank', className:'modal-button'},'Enviar mensaje por Messenger')
      )
    ),
    // Modal Evangelizar/Donar
    modalEvangelizar && e('div',{className:'modal-backdrop', onClick:()=>setModalEvangelizar(false)},
      e('div',{className:'modal-content', onClick:e=>e.stopPropagation()},
        e('h2',{className:'text-xl font-bold mb-2'},'Evangelizar y Apoyar'),
        e('a',{href:'https://m.me/tu_pagina',target:'_blank', className:'modal-button'},'Publicar citas bíblicas'),
        e('a',{href:'https://m.me/tu_pagina',target:'_blank', className:'modal-button'},'Compartir aprendizajes o reflexiones'),
        e('a',{href:'https://www.youtube.com/watch?v=canal_de_coronilla',target:'_blank', className:'modal-button'},'Rezar Coronilla de los Imposibles a San José'),
        e('a',{href:'https://www.paypal.com/donate?hosted_button_id=XXX',target:'_blank', className:'modal-button'},'Donar'),
        e('a',{href:'https://tu_app_v2.com',target:'_blank', className:'modal-button'},'Comprar versión 2')
      )
    )
  );
}

// Card principal
function Card({titulo, versiculo, cita, reflexion, categoria, search}) {
  const [expanded,setExpanded] = React.useState(false);
  const catObj = categories.find(c=>normalize(c.id)===normalize(categoria)) || {color:'bg-gray-600/50'};

  const shareCard = (platform)=>{
    const text = `${cita}\n${versiculo}\nFuente: ${window.location.href}`;
    if(platform==='whatsapp') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`,'_blank');
    if(platform==='facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(text)}`,'_blank');
  };

  return e('div',{className:`card-glass cursor-pointer ${catObj.color}`, onClick:()=>setExpanded(!expanded)},
    e('h2',{className:'text-2xl font-extrabold mb-1'}, highlightText(titulo, search)),
    e('h3',{className:'text-lg font-semibold mb-2'}, highlightText(versiculo, search)),
    expanded && e('div',{className:'mt-2'},
      e('p',null,highlightText(cita, search)),
      e('p',null,highlightText(reflexion, search))
    ),
    e('div',{className:'flex justify-between mt-3 items-center'},
      e('div',{className:'flex gap-2'},
        e('button',{onClick:()=>shareCard('whatsapp'), className:'share-btn'}, e('i',{className:'bi bi-whatsapp text-green-500'})),
        e('button',{onClick:()=>shareCard('facebook'), className:'share-btn'}, e('i',{className:'bi bi-facebook text-blue-500'}))
      ),
      e('button',{className:'floating-btn'}, e('i',{className:'bi bi-journal-text'}),'Mi Diario')
    )
  );
}

// Card del carousel
function CarouselCard({titulo, versiculo, cita, reflexion}){
  const shareCard = (platform)=>{
    const text = `${cita}\n${versiculo}\nFuente: ${window.location.href}`;
    if(platform==='whatsapp') window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`,'_blank');
    if(platform==='facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(text)}`,'_blank');
  };
  return e('div',{className:'carousel-card card-glass'},
    e('h3',{className:'font-bold text-lg mb-1'}, versiculo),
    e('p',{className:'mb-1'}, cita),
    e('p',{className:'text-sm mb-2'}, reflexion),
    e('div',{className:'flex gap-2 justify-end'},
      e('button',{onClick:()=>shareCard('whatsapp'), className:'share-btn'}, e('i',{className:'bi bi-whatsapp text-green-500'})),
      e('button',{onClick:()=>shareCard('facebook'), className:'share-btn'}, e('i',{className:'bi bi-facebook text-blue-500'}))
    )
  );
}

// Floating categories
function FloatingCategories({categories,setCategory,category}){
  const [open,setOpen] = React.useState(false);
  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{className:'floating-btn', onClick:()=>setOpen(!open)}, e('i',{className:'bi bi-list'}),'Palabra'),
    open && e('div',{className:'flex flex-col space-y-2 mt-2'},
      categories.map((cat,i)=>e('button',{
        key:i,
        onClick:()=>{setCategory(cat.id); setOpen(false);},
        className:'menu-option'
      }, e('i',{className:`bi ${cat.icon}`}), cat.label))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
