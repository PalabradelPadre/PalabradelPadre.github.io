<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: radial-gradient(circle at top, #2a1e3b, #0f172a);
}

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}

.share-btn {
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
  transition:0.2s;
}
.share-btn:hover { transform:scale(1.15); }

.category-btn {
  border:1px solid rgba(255,255,255,0.3);
}
</style>
</head>

<body class="text-white font-sans">
<div id="root"></div>

<script>
const e = React.createElement;

// 🎨 colores elegantes por categoría
const colors = {
  ansiedad:'from-blue-500/40 to-blue-800/40',
  tentacion:'from-red-500/40 to-red-800/40',
  motivacion:'from-green-500/40 to-green-800/40',
  caridad:'from-yellow-400/40 to-yellow-700/40',
  confianza:'from-purple-500/40 to-purple-800/40'
};

// 📖 20 CARDS
const cardsData = [
  // ANSIEDAD (4)
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6', cita:'No se inquieten por nada...', reflexion:'Confía en Dios.'},
  {categoria:'ansiedad', titulo:'Paz interior', versiculo:'Juan 14:27', cita:'Mi paz les doy...', reflexion:'Dios calma tu corazón.'},
  {categoria:'ansiedad', titulo:'Entrega tus cargas', versiculo:'1 Pedro 5:7', cita:'Depositen en Él...', reflexion:'Dios cuida de ti.'},
  {categoria:'ansiedad', titulo:'Descansa', versiculo:'Mateo 11:28', cita:'Vengan a mí...', reflexion:'Cristo te da descanso.'},

  // TENTACIÓN (4)
  {categoria:'tentacion', titulo:'Resiste', versiculo:'1 Corintios 10:13', cita:'Dios es fiel...', reflexion:'No estás solo.'},
  {categoria:'tentacion', titulo:'Huye del mal', versiculo:'2 Timoteo 2:22', cita:'Huye...', reflexion:'Evita ocasiones.'},
  {categoria:'tentacion', titulo:'Sé fuerte', versiculo:'Efesios 6:11', cita:'Armadura de Dios...', reflexion:'Defiéndete espiritualmente.'},
  {categoria:'tentacion', titulo:'Pureza', versiculo:'Salmo 119:9', cita:'Guarda tu camino...', reflexion:'La Palabra limpia.'},

  // MOTIVACIÓN (4)
  {categoria:'motivacion', titulo:'Haz el bien', versiculo:'Gálatas 6:9', cita:'No te canses...', reflexion:'Persevera.'},
  {categoria:'motivacion', titulo:'Levántate', versiculo:'Isaías 40:31', cita:'Tendrán fuerzas...', reflexion:'Dios renueva.'},
  {categoria:'motivacion', titulo:'Valentía', versiculo:'Josué 1:9', cita:'Sé fuerte...', reflexion:'Dios está contigo.'},
  {categoria:'motivacion', titulo:'Confía', versiculo:'Salmo 56:3', cita:'En ti confío...', reflexion:'Entrega el miedo.'},

  // CARIDAD (4)
  {categoria:'caridad', titulo:'Ayuda', versiculo:'Mateo 25:40', cita:'Lo hiciste a mí...', reflexion:'Sirve a Cristo.'},
  {categoria:'caridad', titulo:'Amor real', versiculo:'1 Juan 3:18', cita:'Ama con hechos...', reflexion:'Ama de verdad.'},
  {categoria:'caridad', titulo:'Dar', versiculo:'2 Corintios 9:7', cita:'Dador alegre...', reflexion:'Da con amor.'},
  {categoria:'caridad', titulo:'Generosidad', versiculo:'Proverbios 11:25', cita:'Será prosperado...', reflexion:'Comparte.'},

  // CONFIANZA (4)
  {categoria:'confianza', titulo:'Confía en Dios', versiculo:'Proverbios 3:5', cita:'Confía...', reflexion:'Dios guía.'},
  {categoria:'confianza', titulo:'No temas', versiculo:'Isaías 41:10', cita:'Estoy contigo...', reflexion:'Dios sostiene.'},
  {categoria:'confianza', titulo:'Refugio', versiculo:'Salmo 46:1', cita:'Refugio...', reflexion:'Dios protege.'},
  {categoria:'confianza', titulo:'Guía', versiculo:'Salmo 32:8', cita:'Te enseñaré...', reflexion:'Dios dirige.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza'];

function normalize(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}

// APP
function App(){
  const [cat,setCat] = React.useState('Todas');

  const filtered = cat==='Todas'?cardsData:cardsData.filter(c=>normalize(c.categoria)===normalize(cat));

  return e('div',null,

    // HEADER
    e('div',{className:'text-center p-4'},
      e('h1',{className:'text-2xl font-bold text-yellow-300'},'✝ Palabra del Padre 🕊')
    ),

    // GRID
    e('div',{className:'grid md:grid-cols-2 gap-4 p-4'},
      filtered.map((c,i)=>e(Card,{...c,key:i}))
    ),

    // DONAR
    e('div',{className:'text-center my-4'},
      e('button',{
        className:'bg-yellow-400 text-black px-5 py-3 rounded-xl',
        onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX')
      },'🙏 Apoya la misión')
    ),

    e(Floating,{categories,setCat})
  );
}

// CARD
function Card(props){
  const [open,setOpen]=React.useState(false);

  const id = "card-"+Math.random();

  return e('div',{
    id:id,
    className:`glass p-4 rounded-xl border border-white/10`,
    onClick:()=>setOpen(!open)
  },
    e('h2',{className:'font-bold text-yellow-200'},props.titulo),
    e('p',{className:'text-sm'},props.versiculo),

    open && e('div',null,
      e('p',{className:'italic'},"\""+props.cita+"\""),
      e('p',null,props.reflexion),

      // ICONOS RELIGIOSOS
      e('div',{className:'flex gap-2 text-yellow-300 mt-2'},
        "✝","🕊","📖"
      ),

      // COMPARTIR
      e('div',{className:'flex gap-2 mt-3'},
        e('a',{className:'share-btn bg-blue-600'},e('i',{className:'bi bi-facebook'})),
        e('a',{className:'share-btn bg-pink-600'},e('i',{className:'bi bi-instagram'})),
        e('a',{className:'share-btn bg-green-600'},e('i',{className:'bi bi-whatsapp'})),

        // 📸 NUEVO
        e('button',{
          className:'share-btn bg-gray-600',
          onClick:(ev)=>{
            ev.stopPropagation();
            html2canvas(document.getElementById(id)).then(canvas=>{
              const link=document.createElement('a');
              link.download='palabra.png';
              link.href=canvas.toDataURL();
              link.click();
            });
          }
        },"📸")
      )
    )
  );
}

// FLOAT
function Floating({categories,setCat}){
  const [open,setOpen]=React.useState(false);

  return e('div',{className:'fixed bottom-6 right-6'},
    e('button',{className:'bg-indigo-600 px-4 py-2 rounded-full',onClick:()=>setOpen(!open)},"☰"),
    open && e('div',{className:'flex flex-col mt-2 gap-2'},
      categories.map((c,i)=>
        e('button',{key:i,className:'bg-indigo-500 px-3 py-1 category-btn',onClick:()=>{setCat(c);setOpen(false)}},c)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
