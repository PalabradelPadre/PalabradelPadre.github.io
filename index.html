<!DOCTYPE html>
<html lang="es" x-data="app()" x-init="init()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Alpine.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2f">
</head>
<body class="bg-gray-900 text-white font-sans">

<!-- Header -->
<header class="flex justify-between items-center p-4 bg-gray-800 shadow">
  <h1 class="text-xl font-bold">Palabra del Padre</h1>
  <button @click="installPWA()" class="flex items-center bg-green-600 px-3 py-1 rounded hover:bg-green-500">
    <i class="bi bi-download mr-2"></i>Instalar
  </button>
</header>

<!-- Top Button -->
<div class="text-center mt-4">
  <button @click="openMessenger()" class="flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto">
    <i class="bi bi-chat-left-text mr-2"></i>Acompañamiento
  </button>
</div>

<!-- Floating Categories -->
<div class="fixed right-4 bottom-24 flex flex-col space-y-2">
  <template x-for="cat in categories" :key="cat.id">
    <button @click="filter(cat.id)"
      class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded whitespace-nowrap">
      <span x-text="cat.label"></span>
    </button>
  </template>
</div>

<!-- Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">
  <template x-for="card in filteredCards" :key="card.titulo">
    <div class="bg-gray-800 p-4 rounded shadow transform transition duration-300 hover:scale-105 cursor-pointer"
         @click="card.expanded = !card.expanded">
      <h2 class="text-lg font-bold" x-text="card.titulo"></h2>
      <h3 class="text-sm text-gray-300" x-text="card.versiculo"></h3>
      <div x-show="card.expanded" class="mt-2">
        <p class="italic mb-2">&quot;<span x-text="card.cita"></span>&quot;</p>
        <p x-text="card.reflexion"></p>
        <div class="flex space-x-2 mt-2">
          <a :href="'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href)" target="_blank" class="text-blue-600"><i class="bi bi-facebook text-xl"></i></a>
          <a href="https://www.instagram.com/" target="_blank" class="text-pink-500"><i class="bi bi-instagram text-xl"></i></a>
          <a :href="'https://api.whatsapp.com/send?text='+encodeURIComponent(card.cita+' - '+card.reflexion)" target="_blank" class="text-green-500"><i class="bi bi-whatsapp text-xl"></i></a>
        </div>
      </div>
    </div>
  </template>
</div>

<!-- Bottom Donate Button -->
<div class="text-center my-4">
  <button @click="donate()" class="flex items-center bg-white text-gray-900 px-4 py-2 rounded hover:bg-gray-200">
    <i class="bi bi-currency-dollar mr-2"></i>Donar
  </button>
</div>

<script>
function app() {
  return {
    cards: [
      {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, en toda ocasión, con oración y ruego, presenten sus peticiones a Dios y denle gracias.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.', expanded:false},
      {categoria:'tentacion', titulo:'Resiste la tentación', versiculo:'1 Corintios 10:13', cita:'No les ha sobrevenido ninguna tentación que no sea humana; pero fiel es Dios, que no permitirá que ustedes sean tentados más allá de lo que puedan resistir.', reflexion:'Recuerda que Dios te da la fuerza para superar cualquier tentación.', expanded:false},
      {categoria:'motivacion', titulo:'Actúa con bondad', versiculo:'Gálatas 6:9', cita:'No nos cansemos de hacer el bien, porque a su debido tiempo cosecharemos si no nos damos por vencidos.', reflexion:'Cada acto de bondad te acerca más a Dios y ayuda a los demás.', expanded:false},
      {categoria:'caridad', titulo:'Ayuda a otros', versiculo:'Mateo 25:40', cita:'De cierto les digo que todo lo que hicieron por uno de estos mis hermanos más pequeños, a mí me lo hicieron.', reflexion:'Hacer caridad es servir a Dios directamente.', expanded:false},
      {categoria:'confianza', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5-6', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y Él guiará tus caminos.', expanded:false}
    ],
    categories: [
      {id:'ansiedad', label:'Ansiedad'},
      {id:'tentacion', label:'Tentación'},
      {id:'motivacion', label:'Motivación'},
      {id:'caridad', label:'Caridad'},
      {id:'confianza', label:'Confianza'},
      {id:'todas', label:'Todas'}
    ],
    filteredCards: [],
    init() { this.filteredCards = [...this.cards]; },
    filter(cat) { this.filteredCards = (cat==='todas') ? [...this.cards] : this.cards.filter(c=>c.categoria===cat); },
    installPWA() { if(window.deferredPrompt){ window.deferredPrompt.prompt(); window.deferredPrompt.userChoice.then(()=>window.deferredPrompt=null); } },
    openMessenger() { window.open('https://m.me/tuPaginaMessenger','_blank'); },
    donate() { window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank'); }
  }
}

// --- PWA Install Prompt ---
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); window.deferredPrompt = e; });
</script>
</body>
</html>
