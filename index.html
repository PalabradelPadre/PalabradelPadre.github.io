<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- React + ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* Glass cards */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}

/* Botones de compartir pequeños */
.share-btn {
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
}

/* Botón flotante */
.floating-btn {
  border-radius:9999px;
  padding:0.5rem 1rem;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  cursor:pointer;
}
</style>
</head>
<body class="bg-gray-900 text-white font-sans">

<div id="root"></div>

<script>
const e = React.createElement;

// Tonos por categoria
const colors = {
  ansiedad:'bg-blue-500/10 border-blue-400/30',
  tentacion:'bg-red-500/10 border-red-400/30',
  motivacion:'bg-green-500/10 border-green-400/30',
  caridad:'bg-yellow-400/10 border-yellow-400/30',
  confianza:'bg-purple-500/10 border-purple-400/30',
  oraciones:'bg-pink-500/10 border-pink-400/30'
};

// Cards (20+)
const cardsData = [
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6', cita:'No se inquieten por nada; más bien, oren en todo momento.', reflexion:'Confía en Dios.'},
  {categoria:'ansiedad', titulo:'Paz en tu corazón', versiculo:'Juan 14:27', cita:'La paz os dejo, mi paz os doy.', reflexion:'Deja la ansiedad en manos de Dios.'},
  {categoria:'tentacion', titulo:'Resiste', versiculo:'1 Corintios 10:13', cita:'Dios es fiel y no permitirá que sean tentados más allá de lo que puedan resistir.', reflexion:'No estás solo.'},
  {categoria:'tentacion', titulo:'Fuerza divina', versiculo:'Efesios 6:11', cita:'Poneos toda la armadura de Dios.', reflexion:'Protege tu espíritu.'},
  {categoria:'motivacion', titulo:'Levántate', versiculo:'Isaías 40:31', cita:'Los que esperan a Jehová renovarán sus fuerzas.', reflexion:'Dios renueva tu ánimo.'},
  {categoria:'motivacion', titulo:'Actúa con bondad', versiculo:'Gálatas 6:9', cita:'No nos cansemos de hacer el bien.', reflexion:'Cada acto te acerca a Dios.'},
  {categoria:'caridad', titulo:'Ama y ayuda', versiculo:'1 Juan 3:18', cita:'Ama con hechos y en verdad.', reflexion:'La caridad es servicio.'},
  {categoria:'caridad', titulo:'Dar es recibir', versiculo:'Mateo 25:40', cita:'Todo lo que hicieron a mis hermanos más pequeños, a mí me lo hicieron.', reflexion:'Dios ve tu corazón.'},
  {categoria:'confianza', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5', cita:'Confía en el Señor con todo tu corazón.', reflexion:'Ríndete y Él guiará tus caminos.'},
  {categoria:'confianza', titulo:'Fortaleza', versiculo:'Salmo 28:7', cita:'El Señor es mi fortaleza y escudo.', reflexion:'Apóyate en Dios.'},
  {categoria:'oraciones', titulo:'San Miguel Arcángel', versiculo:'Oración tradicional', cita:'San Miguel Arcángel, defiéndenos en la lucha.', reflexion:'Protección espiritual.'},
  {categoria:'oraciones', titulo:'Angelus', versiculo:'Oración tradicional', cita:'El ángel del Señor anunció a María...', reflexion:'Recordar la encarnación.'},
  {categoria:'oraciones', titulo:'Después de la Comunión', versiculo:'Oración tradicional', cita:'Sangre de Cristo, sálvame...', reflexion:'Agradecimiento y protección.'},
  {categoria:'oraciones', titulo:'Oración de la mañana', versiculo:'Oración corta', cita:'Señor, guíame hoy...', reflexion:'Comienza el día con Dios.'},
  {categoria:'oraciones', titulo:'Oración de la noche', versiculo:'Oración corta', cita:'Gracias Señor por este día...', reflexion:'Descansa en paz.'},
  {categoria:'ansiedad', titulo:'No te preocupes', versiculo:'Mateo 6:34', cita:'No os afanéis por el día de mañana.', reflexion:'Vive el presente con fe.'},
  {categoria:'tentacion', titulo:'Controla tus pensamientos', versiculo:'Filipenses 4:8', cita:'Todo lo que es verdadero, puro, justo...', reflexion:'Llena tu mente de bondad.'},
  {categoria:'motivacion', titulo:'Perseverancia', versiculo:'Romanos 5:3-4', cita:'Sufrimientos producen paciencia...', reflexion:'Mantente firme.'},
  {categoria:'caridad', titulo:'Ayuda al prójimo', versiculo:'Lucas 6:38', cita:'Dad y se os dará.', reflexion:'Dios recompensa tu generosidad.'},
  {categoria:'confianza', titulo:'Esperanza', versiculo:'Jeremías 29:11', cita:'Tengo planes de bienestar y esperanza.', reflexion:'Confía en el plan de Dios.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza','Oraciones'];

function normalize(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}

function App(){
  const [cat,setCat] = React.useState('Todas');

  const filtered = cat==='Todas'?cardsData:cardsData.filter(c=>normalize(c.categoria)===normalize(cat));

  return e('div',null,
    // Header
    e('header',{className:'flex justify-between items-center p-4 bg-gray-800 shadow'},
      e('h1',{className:'text-xl font-bold text-center w-full'},"✝ Palabra del Padre 🕊"),
      e('button',{className:'flex items-center bg-green-600 px-3 py-1 rounded hover:bg-green-500', onClick:()=>{if(window.deferredPrompt){window.deferredPrompt.prompt(); window.deferredPrompt.userChoice.then(()=>window.deferredPrompt=null)}}},
        e('i',{className:'bi bi-phone mr-2'}), 'Instalar'
      )
    ),
    // Boton Acompañamiento
    e('div',{className:'text-center mt-4'},
      e('button',{className:'flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto', onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento'
      )
    ),
    // Boton flotante de categorias
    e(FloatingCategories,{categories,setCat}),
    // Cards
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filtered.map((c,i)=>e(Card,{key:i,...c}))
    ),
    // Boton Donar
    e('div',{className:'text-center my-6'},
      e('button',{className:'flex items-center bg-yellow-400 text-black px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')},
        e('i',{className:'bi bi-heart-fill mr-2'}),'Apoya la Misión'
      )
    )
  );
}

// Card
function Card({titulo,versiculo,cita,reflexion,categoria}){
  const [open,setOpen]=React.useState(false);
  const color = colors[categoria]||'bg-gray-700/10 border-gray-400/30';
  return e('div',{className:`glass p-4 rounded-xl border ${color} cursor-pointer`, onClick:()=>setOpen(!open)},
    e('h2',{className:'font-bold text-lg flex items-center justify-between'},titulo),
    e('p',{className:'text-sm text-gray-300'},versiculo),
    open && e('div',{className:'mt-2'},
      e('p',{className:'italic mb-2'},"\""+cita+"\""),
      e('p',null,reflexion),
      e('div',{className:'flex space-x-2 mt-2'},
        e('a',{className:'share-btn text-blue-600', target:'_blank', href:'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href)},
          e('i',{className:'bi bi-facebook'})
        ),
        e('a',{className:'share-btn text-pink-500', target:'_blank', href:'https://www.instagram.com/'},
          e('i',{className:'bi bi-instagram'})
        ),
        e('a',{className:'share-btn text-green-500', target:'_blank', href:'https://api.whatsapp.com/send?text='+encodeURIComponent(cita+' - '+reflexion)},
          e('i',{className:'bi bi-whatsapp'})
        )
      ),
      // Botón Modo Oración por card
      e('div',{className:'mt-2 text-center'},
        e('button',{className:'flex items-center bg-indigo-600 px-3 py-1 rounded hover:bg-indigo-500 mx-auto', onClick:()=>window.open('modo_oracion.html','_blank')},
          e('i',{className:'bi bi-book mr-2'}),'Modo Oración'
        )
      )
    )
  );
}

// Boton flotante categorias
function FloatingCategories({categories,setCat}){
  const [open,setOpen]=React.useState(false);
  return e('div',{className:'fixed right-6 bottom-24 z-50'},
    e('button',{className:'floating-btn bg-indigo-600 text-white', onClick:()=>setOpen(!open)}, 'Categorías'),
    open && e('div',{className:'mt-2 flex flex-col space-y-2 bg-gray-800 p-3 rounded shadow-lg'},
      categories.map((c,i)=>e('button',{key:i,className:'bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded whitespace-nowrap', onClick:()=>{setCat(c); setOpen(false);}}, c))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));

// PWA install
window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); window.deferredPrompt=e; });
</script>
</body>
</html>
