<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: radial-gradient(circle at top, #3b1f5f, #0f172a);
}

.glass {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px);
}

/* efecto respiración */
.breath {
  animation: breathe 6s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: scale(1); opacity:0.8;}
  50% { transform: scale(1.05); opacity:1;}
}

.share-btn {
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
}
</style>
</head>

<body class="text-white font-sans">
<div id="root"></div>

<script>
const e = React.createElement;

// 🎨 tonos suaves
const colors = {
  ansiedad:'bg-blue-500/10',
  tentacion:'bg-red-500/10',
  motivacion:'bg-green-500/10',
  caridad:'bg-yellow-400/10',
  confianza:'bg-purple-500/10'
};

const borderColors = {
  ansiedad:'border-blue-400/30',
  tentacion:'border-red-400/30',
  motivacion:'border-green-400/30',
  caridad:'border-yellow-400/30',
  confianza:'border-purple-400/30'
};

// 📖 cards
const cardsData = [
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6', cita:'No se inquieten por nada...', reflexion:'Confía en Dios.'},
  {categoria:'tentacion', titulo:'Resiste', versiculo:'1 Corintios 10:13', cita:'Dios es fiel...', reflexion:'No estás solo.'},
  {categoria:'motivacion', titulo:'Levántate', versiculo:'Isaías 40:31', cita:'Tendrán fuerzas...', reflexion:'Dios renueva.'},
  {categoria:'caridad', titulo:'Ama', versiculo:'1 Juan 3:18', cita:'Ama con hechos...', reflexion:'Ama de verdad.'},
  {categoria:'confianza', titulo:'Confía', versiculo:'Proverbios 3:5', cita:'Confía en el Señor...', reflexion:'Dios guía.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza'];

function normalize(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();}

// APP
function App(){
  const [cat,setCat] = React.useState('Todas');
  const [modoOracion,setModoOracion] = React.useState(false);
  const [oracion,setOracion] = React.useState(null);

  const filtered = cat==='Todas'?cardsData:cardsData.filter(c=>normalize(c.categoria)===normalize(cat));

  return e('div',null,

    // HEADER
    e('div',{className:'text-center p-5'},
      e('h1',{className:'text-3xl font-bold text-yellow-300'},"✝ Palabra del Padre 🕊")
    ),

    // BOTON MODO ORACION
    e('div',{className:'text-center mb-4'},
      e('button',{
        className:'bg-indigo-600 px-5 py-2 rounded-xl',
        onClick:()=>{
          setOracion(cardsData[Math.floor(Math.random()*cardsData.length)]);
          setModoOracion(true);
        }
      },"🙏 Modo oración")
    ),

    // CARDS
    e('div',{className:'grid md:grid-cols-2 gap-4 p-4'},
      filtered.map((c,i)=>e(Card,{...c,key:i}))
    ),

    // DONAR
    e('div',{className:'text-center my-6'},
      e('button',{
        className:'bg-yellow-400 text-black px-6 py-3 rounded-xl',
        onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX')
      },
        e('i',{className:'bi bi-heart-fill mr-2'}),'Apoya la misión'
      )
    ),

    // MODO ORACION
    modoOracion && e(PrayerMode,{oracion,setModoOracion})
  );
}

// CARD
function Card(props){
  const [open,setOpen]=React.useState(false);
  const color = colors[props.categoria];
  const border = borderColors[props.categoria];

  return e('div',{
    className:`glass p-4 rounded-xl border ${border} ${color}`,
    onClick:()=>setOpen(!open)
  },
    e('h2',{className:'font-bold'},props.titulo),
    e('p',{className:'text-sm'},props.versiculo),

    open && e('div',{className:'mt-2'},
      e('p',{className:'italic'},"\""+props.cita+"\""),
      e('p',null,props.reflexion)
    )
  );
}

// 🙏 MODO ORACION
function PrayerMode({oracion,setModoOracion}){
  const [time,setTime]=React.useState(60);

  React.useEffect(()=>{
    if(time<=0) return;
    const t=setTimeout(()=>setTime(time-1),1000);
    return ()=>clearTimeout(t);
  },[time]);

  return e('div',{
    className:'fixed inset-0 bg-black flex flex-col items-center justify-center text-center p-6 z-50'
  },
    e('div',{className:'breath max-w-md'},

      e('h2',{className:'text-yellow-300 mb-4'},"✝ Oración"),

      e('p',{className:'text-sm mb-2'},oracion.versiculo),

      e('p',{className:'text-xl italic mb-4'},"\""+oracion.cita+"\""),

      e('p',{className:'mb-6'},oracion.reflexion),

      e('div',{className:'text-3xl mb-4'},Math.floor(time/60)+":"+String(time%60).padStart(2,'0')),

      e('div',{className:'flex gap-2 justify-center mb-4'},
        e('button',{className:'bg-gray-700 px-3 py-1 rounded',onClick:()=>setTime(60)},"1 min"),
        e('button',{className:'bg-gray-700 px-3 py-1 rounded',onClick:()=>setTime(180)},"3 min"),
        e('button',{className:'bg-gray-700 px-3 py-1 rounded',onClick:()=>setTime(300)},"5 min")
      ),

      e('button',{
        className:'bg-red-600 px-4 py-2 rounded',
        onClick:()=>setModoOracion(false)
      },"Salir")
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
