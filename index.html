<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>
<link rel="manifest" href="manifest.json">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
}

.header h1 { margin: 0; }

.premium-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 8px 15px;
  border-radius: 12px;
  background: #f59e0b;
  color: white;
  text-decoration: none;
}

.install {
  margin-top: 10px;
  display: none;
  background: #22c55e;
  padding: 8px 15px;
  border-radius: 10px;
  cursor: pointer;
}

/* GRID DE CARDS */
.cards-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.card h3 { margin-top: 0; }

.versiculo { font-weight: bold; margin: 10px 0; }
.reflexion { font-size: 14px; opacity: 0.85; }

/* ACCIONES CARD AGRANDADA */
.card-actions {
  display: none;
  margin-top: 10px;
}

.card-actions a {
  margin: 5px;
  display: inline-block;
  background: rgba(0,0,0,0.4);
  padding: 8px 12px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* BOTONES DE FILTRO FLOTANTE */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #22c55e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.fab-menu {
  position: fixed;
  bottom: 90px;
  right: 20px;
  display: none;
  flex-direction: column;
}

.fab-menu button {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
}

.donar-btn {
  background: #3b82f6;
  padding: 12px 20px;
  border-radius: 12px;
  color: white;
  text-decoration: none;
}

/* COLORES POR CATEGORÍA */
.ansiedad { background: rgba(59,130,246,0.2); }
.tentacion { background: rgba(239,68,68,0.2); }
.motivacion { background: rgba(16,185,129,0.2); }
.caridad { background: rgba(234,179,8,0.2); }
.confianza { background: rgba(139,92,246,0.2); }
</style>
</head>
<body>

<div class="header">
  <h1>Palabra del Padre</h1>
  <p>Cultiva tu amistad con Dios</p>
  <a class="premium-btn" href="https://m.me/TUPAGINA" target="_blank">Acceso Premium ✨</a>
  <div class="install" id="installBtn">Instalar App</div>
</div>

<div class="cards-container" id="cardsContainer"></div>

<div class="footer">
  <a class="donar-btn" href="https://www.paypal.com/paypalme/TUUSUARIO" target="_blank">Donar 🙏</a>
</div>

<!-- BOTÓN FLOTANTE -->
<div class="fab" onclick="toggleFabMenu()">☰</div>
<div class="fab-menu" id="fabMenu">
  <button onclick="filtrar('all')">Todas</button>
  <button onclick="filtrar('ansiedad')">Ansiedad</button>
  <button onclick="filtrar('tentacion')">Tentación</button>
  <button onclick="filtrar('motivacion')">Motivación</button>
  <button onclick="filtrar('caridad')">Caridad</button>
  <button onclick="filtrar('confianza')">Confianza</button>
</div>

<script>
const contenidos = [
  {categoria:'ansiedad', titulo:'Ansiedad', versiculo:'Filipenses 4:6', reflexion:'No cargues solo. Dios ya está contigo en esto.'},
  {categoria:'tentacion', titulo:'Tentación', versiculo:'1 Corintios 10:13', reflexion:'Siempre hay una salida. Recuerda quién eres.'},
  {categoria:'motivacion', titulo:'Motivación', versiculo:'Filipenses 4:13', reflexion:'Haz el bien hoy, aunque cueste.'},
  {categoria:'caridad', titulo:'Caridad', versiculo:'Mateo 25:40', reflexion:'Cada acto de amor cuenta ante Dios.'},
  {categoria:'confianza', titulo:'Confianza', versiculo:'Proverbios 3:5', reflexion:'Confía en Dios incluso cuando no entiendas.'},
  {categoria:'ansiedad', titulo:'Tranquilidad', versiculo:'Salmo 34:4', reflexion:'Dios escucha tus oraciones y calma tu corazón.'},
  {categoria:'tentacion', titulo:'Resistencia', versiculo:'Efesios 6:11', reflexion:'Vístete con la armadura de Dios y resiste la tentación.'},
  {categoria:'motivacion', titulo:'Valor', versiculo:'Josué 1:9', reflexion:'Sé fuerte y valiente; Dios está contigo siempre.'},
  {categoria:'caridad', titulo:'Ayuda al prójimo', versiculo:'Gálatas 6:9', reflexion:'No te canses de hacer el bien.'},
  {categoria:'confianza', titulo:'Esperanza', versiculo:'Romanos 15:13', reflexion:'Que la paz y la esperanza llenen tu corazón.'},
  {categoria:'ansiedad', titulo:'Paz', versiculo:'Isaías 26:3', reflexion:'Confía y Dios mantendrá tu mente en paz.'},
  {categoria:'tentacion', titulo:'Fortaleza', versiculo:'2 Timoteo 1:7', reflexion:'Dios nos dio un espíritu de poder y amor.'},
  {categoria:'motivacion', titulo:'Perseverancia', versiculo:'Hebreos 12:1', reflexion:'Corre con paciencia la carrera de la fe.'},
  {categoria:'caridad', titulo:'Generosidad', versiculo:'Lucas 6:38', reflexion:'Dios bendice a quienes dan con alegría.'},
  {categoria:'confianza', titulo:'Fe', versiculo:'Marcos 11:24', reflexion:'Cree y recibirás según la voluntad de Dios.'},
];

const cardsContainer = document.getElementById('cardsContainer');

function mostrarCards(items){
  cardsContainer.innerHTML='';
  items.forEach(c=>{
    const div = document.createElement('div');
    div.className = `card ${c.categoria}`;
    div.innerHTML = `
      <h3>${c.titulo}</h3>
      <div class="versiculo">${c.versiculo}</div>
      <div class="reflexion">${c.reflexion}</div>
      <div class="card-actions">
        <a href="https://www.facebook.com/sharer/sharer.php?u=${location.href}" target="_blank">Facebook</a>
        <a href="https://m.me/TUPAGINA" target="_blank">Messenger</a>
        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(c.versiculo + ' - ' + c.reflexion)}" target="_blank">WhatsApp</a>
      </div>
    `;
    div.addEventListener('click', ()=>{ 
      const actions = div.querySelector('.card-actions');
      actions.style.display = actions.style.display==='block'?'none':'block';
    });
    cardsContainer.appendChild(div);
  });
}

// FILTRO
function filtrar(cat){
  toggleFabMenu(false);
  if(cat==='all'){ mostrarCards(contenidos); }
  else{ mostrarCards(contenidos.filter(c=>c.categoria===cat)); }
}

// FAB MENU
function toggleFabMenu(force){
  const menu=document.getElementById('fabMenu');
  if(force===false){ menu.style.display='none'; return;}
  menu.style.display=menu.style.display==='flex'?'none':'flex';
}

// INIT
mostrarCards(contenidos);

// PWA install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('installBtn').style.display='inline-block';
});
document.getElementById('installBtn').addEventListener('click', ()=>{
  deferredPrompt.prompt();
});

// SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

// NOTIFICACIÓN DIARIA SIMULADA
function notificacionDiaria() {
  if("Notification" in window){
    const hoy = new Date().toDateString();
    if(localStorage.getItem('ultimaNotificacion')===hoy) return;
    Notification.requestPermission().then(p=>{
      if(p==="granted"){
        const contenido = contenidos[Math.floor(Math.random()*contenidos.length)];
        new Notification("Palabra del Padre", {
          body: `${contenido.versiculo} - ${contenido.reflexion}`,
          icon: "icono.png"
        });
        localStorage.setItem('ultimaNotificacion', hoy);
      }
    });
  }
}
notificacionDiaria();
</script>

</body>
</html>
