<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<!-- React + ReactDOM CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e2f">
</head>
<body class="bg-gray-900 text-white font-sans">

<div id="root"></div>

<script>
const e = React.createElement;

// Colores por categoría
const categoryColors = {
  ansiedad: 'bg-red-700',
  tentacion: 'bg-pink-700',
  motivacion: 'bg-green-700',
  caridad: 'bg-blue-700',
  confianza: 'bg-indigo-700',
  todas: 'bg-gray-600'
};

// Cards (4 por categoría = 20)
const cardsData = [
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; presenten sus peticiones a Dios y denle gracias.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.'},
  {categoria:'ansiedad', titulo:'Paz en el corazón', versiculo:'Juan 14:27', cita:'La paz os dejo, mi paz os doy.', reflexion:'Recibe la paz de Dios y deja ir la ansiedad.'},
  {categoria:'ansiedad', titulo:'Dios cuida de ti', versiculo:'Salmo 55:22', cita:'Echa sobre Jehová tu carga, y él te sustentará.', reflexion:'No cargues solo tus problemas, confía en Dios.'},
  {categoria:'ansiedad', titulo:'Descansa en Él', versiculo:'Mateo 11:28', cita:'Venid a mí todos los que estáis trabajados y cargados, y yo os haré descansar.', reflexion:'Dios quiere aliviar tu carga y darte descanso.'},

  {categoria:'tentacion', titulo:'Resiste la tentación', versiculo:'1 Corintios 10:13', cita:'Dios no permitirá que seas tentado más allá de tu capacidad.', reflexion:'Dios te da la fuerza para superar cualquier tentación.'},
  {categoria:'tentacion', titulo:'Firme en la fe', versiculo:'Santiago 4:7', cita:'Sométanse a Dios; resistan al diablo, y él huirá.', reflexion:'Mantente firme y Dios te protegerá.'},
  {categoria:'tentacion', titulo:'Evita el mal', versiculo:'Efesios 6:11', cita:'Poneos toda la armadura de Dios para poder resistir al diablo.', reflexion:'La oración y la fe te protegen de la tentación.'},
  {categoria:'tentacion', titulo:'Confía en la gracia', versiculo:'Hebreos 4:16', cita:'Acerquémonos confiadamente al trono de la gracia.', reflexion:'Dios siempre ofrece ayuda y perdón.'},

  {categoria:'motivacion', titulo:'Actúa con bondad', versiculo:'Gálatas 6:9', cita:'No nos cansemos de hacer el bien.', reflexion:'Cada acto de bondad te acerca más a Dios.'},
  {categoria:'motivacion', titulo:'Siembra esperanza', versiculo:'Romanos 15:13', cita:'Que el Dios de la esperanza los llene de gozo y paz.', reflexion:'Mantén la esperanza y contagia alegría a otros.'},
  {categoria:'motivacion', titulo:'No te rindas', versiculo:'Isaías 40:31', cita:'Los que esperan a Jehová renovarán sus fuerzas.', reflexion:'La paciencia y fe renuevan tu energía.'},
  {categoria:'motivacion', titulo:'Confianza en Dios', versiculo:'Proverbios 16:3', cita:'Encomienda a Jehová tus obras, y tus planes tendrán éxito.', reflexion:'Entrega tus planes a Dios y confía.'},

  {categoria:'caridad', titulo:'Ayuda a otros', versiculo:'Mateo 25:40', cita:'Lo que hicieron por uno de estos, lo hicieron por mí.', reflexion:'Hacer caridad es servir a Dios directamente.'},
  {categoria:'caridad', titulo:'Comparte tu bendición', versiculo:'Lucas 6:38', cita:'Den, y se les dará medida buena y rebosante.', reflexion:'Compartir multiplica las bendiciones.'},
  {categoria:'caridad', titulo:'Amor en acción', versiculo:'1 Juan 3:18', cita:'No amemos de palabra, sino con hechos y verdad.', reflexion:'La verdadera caridad se demuestra con acción.'},
  {categoria:'caridad', titulo:'Generosidad', versiculo:'Proverbios 11:25', cita:'El alma generosa será prosperada.', reflexion:'Dar con alegría devuelve bendiciones a tu vida.'},

  {categoria:'confianza', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5-6', cita:'Confía en el Señor con todo tu corazón.', reflexion:'Ríndete a Dios y Él guiará tus caminos.'},
  {categoria:'confianza', titulo:'Apóyate en Dios', versiculo:'Salmo 37:5', cita:'Encomienda a Jehová tu camino, confía en él.', reflexion:'Dios nunca falla cuando confías plenamente en Él.'},
  {categoria:'confianza', titulo:'Fe firme', versiculo:'Hebreos 11:1', cita:'La fe es la certeza de lo que se espera.', reflexion:'Mantente firme en la fe, incluso cuando no veas el resultado.'},
  {categoria:'confianza', titulo:'Seguridad en Dios', versiculo:'Isaías 26:3', cita:'Tú guardarás en completa paz a aquel cuyo pensamiento en ti persevera.', reflexion:'Piensa en Dios y Él te dará paz.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza'];

function App() {
  const [category, setCategory] = React.useState('Todas');

  let filteredCards = category==='Todas' ? cardsData : cardsData.filter(c=>c.categoria.toLowerCase()===category.toLowerCase());

  return e('div', {className:'min-h-screen flex flex-col'},
    e('header',{className:'flex justify-between items-center p-4 bg-gray-800 shadow'},
      e('h1',{className:'text-xl font-bold'},'Palabra del Padre'),
      e('button',{className:'flex items-center bg-green-600 px-3 py-1 rounded hover:bg-green-500', onClick:()=>{if(window.deferredPrompt){window.deferredPrompt.prompt(); window.deferredPrompt.userChoice.then(()=>window.deferredPrompt=null)}}},
        e('i',{className:'bi bi-phone mr-2'}), 'Instalar'
      )
    ),
    e('div',{className:'text-center mt-4'},
      e('button',{className:'flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto', onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento'
      )
    ),
    e(FloatingCategories,{categories, setCategory}),
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card}))
    ),
    e('div',{className:'text-center my-4'},
      e('button',{className:'flex items-center bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')},
        e('i',{className:'bi bi-hand-thumbs-up-fill mr-2'}),'Donar'
      )
    )
  );
}

function Card({categoria, titulo, versiculo, cita, reflexion}) {
  const [expanded, setExpanded] = React.useState(true);
  const bgColor = categoryColors[categoria] || 'bg-gray-800';
  return e('div',{className:`${bgColor} p-4 rounded shadow transform transition duration-300 hover:scale-105 cursor-pointer text-white`, onClick:()=>setExpanded(!expanded)},
    e('h2',{className:'text-lg font-bold'},titulo),
    e('h3',{className:'text-sm text-gray-200'},versiculo),
    expanded && e('div', {className:'mt-2'},
      e('p',{className:'italic mb-2'},`"${cita}"`),
      e('p',null,reflexion),
      e('div',{className:'flex space-x-3 mt-2 justify-start'},
        e('a',{href:'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href), target:'_blank', className:'bg-blue-500 p-3 rounded-full hover:bg-blue-400 flex justify-center items-center'},
          e('i',{className:'bi bi-facebook text-xl text-white'})
        ),
        e('a',{href:'https://www.instagram.com/', target:'_blank', className:'bg-pink-500 p-3 rounded-full hover:bg-pink-400 flex justify-center items-center'},
          e('i',{className:'bi bi-instagram text-xl text-white'})
        ),
        e('a',{href:'https://api.whatsapp.com/send?text='+encodeURIComponent(cita+' - '+reflexion), target:'_blank', className:'bg-green-500 p-3 rounded-full hover:bg-green-400 flex justify-center items-center'},
          e('i',{className:'bi bi-whatsapp text-xl text-white'})
        )
      )
    )
  );
}

function FloatingCategories({categories, setCategory}) {
  const [open, setOpen] = React.useState(false);
  return e('div', {className:'fixed bottom-24 right-6 z-50'},
    e('button',{className:'bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg hover:scale-110 transition transform', onClick:()=>setOpen(!open)}, 'Categorías'),
    open && e('div',{className:'mt-2 flex flex-col space-y-2 p-3 rounded shadow-lg'},
      categories.map((cat,i)=>{
        const color = categoryColors[cat.toLowerCase()] || 'bg-gray-600';
        return e('button',{key:i, className:`${color} hover:opacity-80 px-3 py-1 rounded whitespace-nowrap text-white`, onClick:()=>{setCategory(cat); setOpen(false);}}, cat)
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));

// PWA install
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); window.deferredPrompt = e; });
</script>

</body>
</html>
