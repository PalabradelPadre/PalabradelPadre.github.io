<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Ionic Core CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css"/>

<!-- Ionic Core JS -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>

<!-- Bootstrap Icons para compartir -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  margin:0; padding:0;
  background: linear-gradient(135deg,#1e1e2f,#2a2a3d);
  color:white;
}

/* Header */
ion-header{
  --background:#111122;
}
ion-title{
  color:white;
}
.top-buttons ion-button{
  --background:#4f46e5;
  --border-radius:25px;
  color:white;
  font-weight:bold;
}
.bottom-buttons ion-button{
  --background:white;
  --color:#333;
  --border-radius:25px;
  font-weight:bold;
}

/* Cards */
ion-card{
  margin: 10px;
  --background: rgba(255,255,255,0.05);
  border-radius:20px;
}
ion-card.ansiedad{--background: rgba(59,130,246,0.3);}
ion-card.tentacion{--background: rgba(239,68,68,0.3);}
ion-card.motivacion{--background: rgba(16,185,129,0.3);}
ion-card.caridad{--background: rgba(234,179,8,0.3);}
ion-card.confianza{--background: rgba(139,92,246,0.3);}

/* Card actions share */
.card-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.card-actions a{
  width:40px; height:40px;
  display:flex; justify-content:center; align-items:center;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  color:white; font-size:20px;
  transition: transform 0.3s ease, background 0.3s ease;
}
.card-actions a:hover{
  transform: scale(1.2);
  background: rgba(255,255,255,0.4);
}

/* Floating categories */
ion-fab{
  bottom: 80px;
  right: 20px;
}
ion-fab-list ion-fab-button{
  --background:#6d28d9;
}
</style>
</head>
<body>

<ion-app>

  <!-- Header -->
  <ion-header>
    <ion-toolbar>
      <ion-title>Palabra del Padre</ion-title>
      <ion-buttons slot="end">
        <ion-button id="installBtn">Instalar App</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <!-- Top Premium Button -->
  <ion-content>
    <div class="top-buttons" style="text-align:center; margin:10px;">
      <ion-button expand="block" onclick="window.location.href='https://m.me/tuPaginaMessenger'">Premium</ion-button>
    </div>

    <!-- Cards Container -->
    <ion-grid id="cardsContainer"></ion-grid>

    <!-- Bottom Donate Button -->
    <div class="bottom-buttons" style="text-align:center; margin:10px;">
      <ion-button expand="block" onclick="window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')">Donar</ion-button>
    </div>

    <!-- Floating Expandable Categories -->
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button id="mainFab">☰</ion-fab-button>
      <ion-fab-list side="top">
        <ion-fab-button onclick="filtrar('ansiedad')">Ansiedad</ion-fab-button>
        <ion-fab-button onclick="filtrar('tentacion')">Tentación</ion-fab-button>
        <ion-fab-button onclick="filtrar('motivacion')">Motivación</ion-fab-button>
        <ion-fab-button onclick="filtrar('caridad')">Caridad</ion-fab-button>
        <ion-fab-button onclick="filtrar('confianza')">Confianza</ion-fab-button>
        <ion-fab-button onclick="filtrar('todas')">Todas</ion-fab-button>
      </ion-fab-list>
    </ion-fab>

  </ion-content>
</ion-app>

<script>
// ------------------ Install Button ------------------
let deferredPrompt;
const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display='inline-block';
});
installBtn.addEventListener('click', async ()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    const choice=await deferredPrompt.userChoice;
    deferredPrompt=null;
    installBtn.style.display='none';
  }
});

// ------------------ Cards Content ------------------
const contenido=[
  {categoria:'ansiedad',titulo:'No tengas miedo',versiculo:'Filipenses 4:6-7',cita:'No se inquieten por nada; más bien, en toda ocasión, con oración y ruego, presenten sus peticiones a Dios y denle gracias.',reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.'},
  {categoria:'tentacion',titulo:'Resiste la tentación',versiculo:'1 Corintios 10:13',cita:'No les ha sobrevenido ninguna tentación que no sea humana; pero fiel es Dios, que no permitirá que ustedes sean tentados más allá de lo que puedan resistir.',reflexion:'Recuerda que Dios te da la fuerza para superar cualquier tentación.'},
  {categoria:'motivacion',titulo:'Actúa con bondad',versiculo:'Gálatas 6:9',cita:'No nos cansemos de hacer el bien, porque a su debido tiempo cosecharemos si no nos damos por vencidos.',reflexion:'Cada acto de bondad te acerca más a Dios y ayuda a los demás.'},
  {categoria:'caridad',titulo:'Ayuda a otros',versiculo:'Mateo 25:40',cita:'De cierto les digo que todo lo que hicieron por uno de estos mis hermanos más pequeños, a mí me lo hicieron.',reflexion:'Hacer caridad es servir a Dios directamente.'},
  {categoria:'confianza',titulo:'Confía en el Señor',versiculo:'Proverbios 3:5-6',cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.',reflexion:'Ríndete a Dios y Él guiará tus caminos.'},
  {categoria:'ansiedad',titulo:'Paz interior',versiculo:'Salmo 23:1-3',cita:'El Señor es mi pastor; nada me faltará. Me hace descansar en verdes praderas.',reflexion:'Confía y hallarás paz en Él.'},
  {categoria:'tentacion',titulo:'Controla tus deseos',versiculo:'Mateo 26:41',cita:'Velad y orad, para que no entréis en tentación; el espíritu está dispuesto, pero la carne es débil.',reflexion:'Orar ayuda a resistir.'},
  {categoria:'motivacion',titulo:'Sé valiente',versiculo:'Josué 1:9',cita:'Mira que te mando que te esfuerces y seas valiente; no temas ni te acobardes.',reflexion:'Dios te acompaña en cada paso.'},
  {categoria:'caridad',titulo:'Comparte tus bienes',versiculo:'Hechos 20:35',cita:'Más bienaventurado es dar que recibir.',reflexion:'El dar nos acerca al corazón de Dios.'},
  {categoria:'confianza',titulo:'Entrega tus caminos',versiculo:'Salmo 37:5',cita:'Encomienda al Señor tu camino; confía en Él, y Él actuará.',reflexion:'Entrega tu vida y confía en Dios.'},
  {categoria:'motivacion',titulo:'Persevera',versiculo:'Romanos 5:3-4',cita:'Nos gloriamos incluso en las tribulaciones, sabiendo que la tribulación produce paciencia.',reflexion:'La paciencia fortalece tu espíritu.'},
  {categoria:'ansiedad',titulo:'No temas al futuro',versiculo:'Isaías 41:10',cita:'No temas, porque yo estoy contigo; no desmayes, porque yo soy tu Dios.',reflexion:'Dios está contigo siempre.'},
  {categoria:'tentacion',titulo:'Purifica tu corazón',versiculo:'Salmo 51:10',cita:'Crea en mí, oh Dios, un corazón limpio, y renueva un espíritu recto dentro de mí.',reflexion:'Pide a Dios fuerza para resistir.'},
  {categoria:'caridad',titulo:'Amar al prójimo',versiculo:'Juan 13:34',cita:'Un mandamiento nuevo os doy: Que os améis unos a otros; como yo os he amado.',reflexion:'Ama a los demás como Dios nos ama.'},
  {categoria:'confianza',titulo:'Esperanza firme',versiculo:'Hebreos 10:23',cita:'Mantengamos firme la esperanza que profesamos.',reflexion:'Confía en las promesas de Dios.'}
];

const cardsContainer=document.getElementById('cardsContainer');
function mostrarCards(items){
  cardsContainer.innerHTML='';
  items.forEach(c=>{
    const card = document.createElement('ion-card');
    card.classList.add(c.categoria);
    card.innerHTML=`
      <ion-card-header>
        <ion-card-title>${c.titulo}</ion-card-title>
        <ion-card-subtitle>${c.versiculo}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p><em>${c.cita}</em></p>
        <p>${c.reflexion}</p>
        <div class="card-actions">
          <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}" target="_blank"><i class="bi bi-facebook"></i></a>
          <a href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram"></i></a>
          <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(c.cita+' - '+c.reflexion)}" target="_blank"><i class="bi bi-whatsapp"></i></a>
        </div>
      </ion-card-content>
    `;
    cardsContainer.appendChild(card);
  });
}
mostrarCards(contenido);

function filtrar(cat){
  if(cat==='todas'){mostrarCards(contenido);}
  else{mostrarCards(contenido.filter(c=>c.categoria===cat));}
}
</script>
</body>
</html>
