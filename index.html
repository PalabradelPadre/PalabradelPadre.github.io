<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* TARJETA */
.card {
  width: 90%;
  max-width: 420px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

h1 {
  margin-bottom: 5px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

.versiculo {
  margin-top: 20px;
  font-size: 18px;
  font-weight: 600;
}

.reflexion {
  margin-top: 10px;
  font-size: 15px;
  opacity: 0.85;
}

/* BOTONES */
.actions {
  margin-top: 20px;
}

.btn {
  padding: 10px 15px;
  border-radius: 12px;
  margin: 5px;
  text-decoration: none;
  color: white;
  display: inline-block;
  font-size: 14px;
}

.donar { background: #3b82f6; }
.premium { background: #f59e0b; }

/* FAB */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #22c55e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
}

/* MENU */
.menu {
  position: fixed;
  bottom: 90px;
  right: 20px;
  display: none;
  flex-direction: column;
}

.menu button {
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  <h1>Palabra del Padre</h1>
  <div class="subtitle">Cerca de Dios en tu día a día</div>

  <div class="versiculo" id="versiculo"></div>
  <div class="reflexion" id="reflexion"></div>

  <div class="actions">
    <a class="btn donar" href="https://www.paypal.com/paypalme/TUUSUARIO" target="_blank">Donar</a>
    <a class="btn premium" href="https://m.me/TUPAGINA" target="_blank">Premium</a>
  </div>
</div>

<div class="fab" onclick="toggleMenu()">+</div>

<div class="menu" id="menu">
  <button onclick="mostrar('ansiedad')">Ansiedad</button>
  <button onclick="mostrar('tentacion')">Tentación</button>
  <button onclick="mostrar('motivacion')">Motivación</button>
</div>

<script>
const data = {
  ansiedad: {
    versiculo: "No se inquieten por nada… (Fil 4:6)",
    reflexion: "Confía en Dios hoy. No cargues solo."
  },
  tentacion: {
    versiculo: "Dios es fiel… (1 Cor 10:13)",
    reflexion: "No estás solo en la lucha."
  },
  motivacion: {
    versiculo: "Todo lo puedo… (Fil 4:13)",
    reflexion: "Haz el bien hoy, aunque cueste."
  }
};

function mostrar(tipo) {
  document.getElementById("versiculo").innerText = data[tipo].versiculo;
  document.getElementById("reflexion").innerText = data[tipo].reflexion;
  document.getElementById("menu").style.display = "none";
}

function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

mostrar("ansiedad");

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
