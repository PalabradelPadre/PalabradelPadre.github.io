<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: radial-gradient(circle at top, #3b1f5f, #1a1a2e);
}

/* efecto glass */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* botones compartir */
.share-btn {
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.3);
  transition:0.2s;
}
.share-btn:hover { transform:scale(1.15); }

/* categorías */
.category-btn {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:8px;
}
</style>
</head>

<body class="text-white font-sans">
<div id="root"></div>

<script>
const e = React.createElement;

// 🎨 colores por categoría
const colors = {
  ansiedad:'from-blue-500 to-blue-700',
  tentacion:'from-red-500 to-red-700',
  motivacion:'from-green-500 to-green-700',
  caridad:'from-yellow-400 to-yellow-600',
  confianza:'from-purple-500 to-purple-700',
  oraciones:'from-pink-500 to-pink-700'
};

// 📖 DATOS (ejemplo resumido, puedes seguir agregando más)
const cardsData = [
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6', cita:'No se inquieten por nada...', reflexion:'Dios cuida de ti incluso en la ansiedad.'},
  {categoria:'tentacion', titulo:'Resiste', versiculo:'1 Corintios 10:13', cita:'Dios no permitirá...', reflexion:'No estás solo en la lucha.'},
  {categoria:'motivacion', titulo:'Haz el bien', versiculo:'Gálatas 6:9', cita:'No nos cansemos...', reflexion:'Tu esfuerzo tiene sentido.'},
  {categoria:'caridad', titulo:'Ama al prójimo', versiculo:'Mateo 25:40', cita:'Lo que hiciste...', reflexion:'Servir es amar a Dios.'},
  {categoria:'confianza', titulo:'Confía', versiculo:'Proverbios 3:5', cita:'Confía en el Señor...', reflexion:'Dios guía tu camino.'},

  {categoria:'oraciones', titulo:'San Miguel Arcángel', versiculo:'Oración', cita:`San Miguel Arcángel,
defiéndenos en la batalla,
sé nuestro amparo...`, reflexion:'Protección espiritual diaria.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza','Oraciones'];

function normalize(str){
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

// APP
function App(){
  const [category,setCategory] = React.useState('Todas');

  const filtered = category==='Todas'
    ? cardsData
    : cardsData.filter(c=>normalize(c.categoria)===normalize(category));

  return e('div',{className:'min-h-screen flex flex-col'},

    // HEADER
    e('header',{className:'text-center p-4'},
      e('div',{className:'flex justify-center items-center gap-2 text-yellow-400'},
        e('i',{className:'bi bi-cross'}),
        e('h1',{className:'text-2xl font-bold'},'Palabra del Padre'),
        e('i',{className:'bi bi-dove'})
      ),
      e('p',{className:'text-sm text-gray-300 mt-1'},'Reflexiones para tu vida diaria con Dios')
    ),

    // ACOMPAÑAMIENTO
    e('div',{className:'text-center mt-3'},
      e('button',{
        className:'bg-purple-600 px-4 py-2 rounded-lg shadow hover:bg-purple-500',
        onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')
      },
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento diario'
      )
    ),

    // CARDS
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 gap-4 p-4'},
      filtered.map((c,i)=>e(Card,{key:i,...c}))
    ),

    // DONACIÓN (MEJORADA)
    e('div',{className:'text-center mt-6 mb-4'},
      e('p',{className:'text-sm text-gray-300 mb-2'},
        'Tu apoyo permite que más personas reciban la Palabra de Dios'
      ),
      e('button',{
        className:'bg-yellow-400 text-black px-6 py-3 rounded-xl shadow-lg hover:bg-yellow-300',
        onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')
      },
        e('i',{className:'bi bi-heart-fill mr-2'}),'Apoya esta misión'
      )
    ),

    e(FloatingCategories,{categories,setCategory})
  );
}

// CARD
function Card({titulo,versiculo,cita,reflexion,categoria}){
  const [open,setOpen] = React.useState(false);

  return e('div',{
    className:`glass p-4 rounded-xl shadow cursor-pointer border border-white/10`,
    onClick:()=>setOpen(!open)
  },

    e('div',{className:'flex items-center gap-2 mb-1'},
      e('i',{className:'bi bi-book text-yellow-300'}),
      e('h2',{className:'font-bold'},titulo)
    ),

    e('p',{className:'text-sm text-gray-300'},versiculo),

    open && e('div',{className:'mt-2'},
      e('p',{className:'italic whitespace-pre-line mb-2'},`"${cita}"`),
      e('p',{className:'text-sm'},reflexion),

      // ICONOS RELIGIOSOS DECORATIVOS
      e('div',{className:'flex gap-2 mt-2 text-yellow-300'},
        e('i',{className:'bi bi-cross'}),
        e('i',{className:'bi bi-dove'}),
        e('i',{className:'bi bi-stars'})
      ),

      // COMPARTIR
      e('div',{className:'flex gap-2 mt-3'},
        e('a',{href:'#',className:'share-btn bg-blue-600'},e('i',{className:'bi bi-facebook'})),
        e('a',{href:'#',className:'share-btn bg-green-600'},e('i',{className:'bi bi-whatsapp'}))
      )
    )
  );
}

// BOTÓN FLOTANTE
function FloatingCategories({categories,setCategory}){
  const [open,setOpen] = React.useState(false);

  return e('div',{className:'fixed bottom-6 right-6 z-50'},

    e('button',{
      className:'bg-indigo-600 px-4 py-3 rounded-full shadow-lg',
      onClick:()=>setOpen(!open)
    },'☰'),

    open && e('div',{className:'mt-2 flex flex-col gap-2'},
      categories.map((c,i)=>
        e('button',{
          key:i,
          className:'bg-indigo-500 px-3 py-1 category-btn',
          onClick:()=>{setCategory(c); setOpen(false);}
        },c)
      )
    )
  );
}

// RENDER
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
