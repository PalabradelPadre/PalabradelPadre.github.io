<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- React + ReactDOM CDN -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a1e3b">
<style>
  body { background: linear-gradient(to bottom, #2a1e3b, #3b1f5f); }
  .share-btn { 
    width: 36px; height: 36px; 
    display:flex; align-items:center; justify-content:center; 
    border-radius:50%; 
    transition: transform 0.2s; 
    border: 1px solid rgba(255,255,255,0.4); 
  }
  .share-btn:hover { transform: scale(1.2); }
  .category-btn { 
    border: 1px solid rgba(255,255,255,0.4); 
    border-radius: 0.375rem; 
  }
</style>
</head>
<body class="text-white font-sans">

<div id="root"></div>

<script>
const e = React.createElement;

// Datos de cards (5 categorías + Oraciones, 4 cards cada una)
const cardsData = [
  // Ansiedad
  {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, en toda ocasión, con oración y ruego, presenten sus peticiones a Dios y denle gracias.', reflexion:'Confía en Dios y deja tus preocupaciones en manos de Dios.'},
  {categoria:'ansiedad', titulo:'Paz en tu corazón', versiculo:'Juan 14:27', cita:'La paz os dejo, mi paz os doy; no como el mundo la da, yo os la doy.', reflexion:'Busca la paz de Dios en tu corazón cada día.'},
  {categoria:'ansiedad', titulo:'Entrega tus cargas', versiculo:'1 Pedro 5:7', cita:'Echando toda vuestra ansiedad sobre él, porque él tiene cuidado de vosotros.', reflexion:'No cargues solo tus preocupaciones, Dios está contigo.'},
  {categoria:'ansiedad', titulo:'Confía en Dios', versiculo:'Proverbios 3:5', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y deja que Él guíe tus pasos.'},
  
  // Tentación
  {categoria:'tentacion', titulo:'Resiste la tentación', versiculo:'1 Corintios 10:13', cita:'No les ha sobrevenido ninguna tentación que no sea humana; pero fiel es Dios, que no permitirá que ustedes sean tentados más allá de lo que puedan resistir.', reflexion:'Dios te da la fuerza para superar cualquier tentación.'},
  {categoria:'tentacion', titulo:'Huye del mal', versiculo:'2 Timoteo 2:22', cita:'Huye también de las pasiones juveniles; sigue la justicia, la fe, el amor y la paz.', reflexion:'Alejarte de lo que no agrada a Dios es un acto de sabiduría.'},
  {categoria:'tentacion', titulo:'Sé firme', versiculo:'Efesios 6:11', cita:'Vestíos de toda la armadura de Dios, para que podáis estar firmes contra las asechanzas del diablo.', reflexion:'Mantente firme con la ayuda de Dios.'},
  {categoria:'tentacion', titulo:'Dios te fortalece', versiculo:'Salmos 119:9', cita:'¿Con qué limpiará el joven su camino? Con guardar tu palabra.', reflexion:'Fortalece tu corazón con la Palabra de Dios.'},

  // Motivación
  {categoria:'motivacion', titulo:'Actúa con bondad', versiculo:'Gálatas 6:9', cita:'No nos cansemos de hacer el bien, porque a su debido tiempo cosecharemos si no nos damos por vencidos.', reflexion:'Cada acto de bondad te acerca más a Dios y ayuda a los demás.'},
  {categoria:'motivacion', titulo:'Levántate con fe', versiculo:'Isaías 40:31', cita:'Pero los que esperan a Jehová tendrán nuevas fuerzas; levantarán alas como las águilas.', reflexion:'La fe te renueva y fortalece.'},
  {categoria:'motivacion', titulo:'Sé valiente', versiculo:'Josué 1:9', cita:'Sé fuerte y valiente; no temas ni desmayes, porque Jehová tu Dios estará contigo dondequiera que vayas.', reflexion:'Dios está contigo en cada desafío.'},
  {categoria:'motivacion', titulo:'Confianza diaria', versiculo:'Salmos 56:3', cita:'En el día que temo, yo en ti confío.', reflexion:'Confía en Dios cada día, incluso en el miedo.'},

  // Caridad
  {categoria:'caridad', titulo:'Ayuda a otros', versiculo:'Mateo 25:40', cita:'De cierto les digo que todo lo que hicieron por uno de estos mis hermanos más pequeños, a mí me lo hicieron.', reflexion:'Hacer caridad es servir a Dios directamente.'},
  {categoria:'caridad', titulo:'Ama al prójimo', versiculo:'1 Juan 3:18', cita:'Hijitos míos, no amemos de palabra ni de lengua, sino de hecho y en verdad.', reflexion:'El amor se demuestra con acciones concretas.'},
  {categoria:'caridad', titulo:'Da con alegría', versiculo:'2 Corintios 9:7', cita:'Cada uno dé como propuso en su corazón, no con tristeza ni por necesidad; porque Dios ama al dador alegre.', reflexion:'Dar con alegría multiplica la bendición.'},
  {categoria:'caridad', titulo:'Sé generoso', versiculo:'Proverbios 11:25', cita:'El alma generosa será prosperada; y el que saciare, él también será saciado.', reflexion:'La generosidad abre puertas de bendición.'},

  // Confianza
  {categoria:'confianza', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5-6', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y Él guiará tus caminos.'},
  {categoria:'confianza', titulo:'Dios es tu guía', versiculo:'Salmos 32:8', cita:'Te haré entender y te enseñaré el camino en que debes andar; sobre ti fijaré mis ojos.', reflexion:'Dios te guía y te protege en cada paso.'},
  {categoria:'confianza', titulo:'Fortaleza divina', versiculo:'Isaías 41:10', cita:'No temas, porque yo estoy contigo; no desmayes, porque yo soy tu Dios.', reflexion:'Encuentra fortaleza en Dios.'},
  {categoria:'confianza', titulo:'Refugio seguro', versiculo:'Salmos 46:1', cita:'Dios es nuestro refugio y fortaleza, nuestro pronto auxilio en las tribulaciones.', reflexion:'Busca en Él tu refugio diario.'},

  // Oraciones
  {categoria:'oraciones', titulo:'Oración a San Miguel', versiculo:'San Miguel Arcángel', cita:'San Miguel Arcángel, defiéndenos en la batalla; sé nuestro amparo contra la maldad y asechanzas del demonio.', reflexion:'Lleva esta oración en tu bolsillo para protección diaria.'},
  {categoria:'oraciones', titulo:'El Angelus', versiculo:'Oración tradicional', cita:'El Ángel del Señor anunció a María, y concibió por obra del Espíritu Santo.', reflexion:'Reza cada día el Angelus para meditar en la Encarnación.'},
  {categoria:'oraciones', titulo:'Después de la comunión', versiculo:'Sangre de Cristo, sálvame', cita:'Sangre de Cristo, sálvame; pasión de Cristo, fortaléceme.', reflexion:'Oración corta y poderosa tras recibir la Eucaristía.'},
  {categoria:'oraciones', titulo:'Oración de protección', versiculo:'Protección diaria', cita:'Ángel de Dios, mi guardián, ilumíname y protégeme hoy y siempre.', reflexion:'Útil para llevar y rezar en cualquier momento.'}
];

const categories = ['Todas','Ansiedad','Tentación','Motivación','Caridad','Confianza','Oraciones'];
const categoryColors = {
  'ansiedad':'bg-blue-600', 
  'tentacion':'bg-red-600', 
  'motivacion':'bg-green-600', 
  'caridad':'bg-yellow-500', 
  'confianza':'bg-purple-600',
  'oraciones':'bg-pink-600',
  'todas':'bg-indigo-600'
};
function normalize(str){return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();}

// App principal
function App() {
  const [category, setCategory] = React.useState('Todas');
  const filteredCards = category==='Todas' 
    ? cardsData 
    : cardsData.filter(c=>normalize(c.categoria) === normalize(category));
  return e('div',{className:'min-h-screen flex flex-col'},
    e('header',{className:'flex justify-between items-center p-4 bg-gray-800 shadow'},
      e('h1',{className:'text-xl font-bold'},'Palabra del Padre'),
      e('button',{className:'flex items-center bg-green-600 px-3 py-1 rounded hover:bg-green-500', onClick:()=>{if(window.deferredPrompt){window.deferredPrompt.prompt(); window.deferredPrompt.userChoice.then(()=>window.deferredPrompt=null)}}},
        e('i',{className:'bi bi-phone mr-2'}), 'Instalar'
      )
    ),
    e('div',{className:'text-center mt-4'},
      e('button',{className:'flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto', onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento'
      )
    ),
    e(FloatingCategories,{categories, setCategory, category}),
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card}))
    ),
    e('div',{className:'text-center my-4'},
      e('button',{className:'flex items-center bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')},
        e('i',{className:'bi bi-hand-thumbs-up mr-2'}),'Apoya la misión'
      )
    ),
    e('footer',{className:'text-center py-4 text-gray-300'},'Gracias por apoyar esta herramienta de crecimiento espiritual.')
  );
}

// Card con borde sutil
function Card({titulo, versiculo, cita, reflexion, categoria}){
  const [expanded, setExpanded] = React.useState(false);
  const color = categoryColors[normalize(categoria)] || 'bg-gray-600';
  return e('div',{className:`${color} p-4 rounded shadow transform transition-all duration-300 hover:scale-105 cursor-pointer border border-white/20`, onClick:()=>setExpanded(!expanded)},
    e('h2',{className:'text-lg font-bold'},titulo),
    e('h3',{className:'text-sm text-gray-200'},versiculo),
    e('div',{className:`overflow-hidden transition-all duration-500 ${expanded ? 'max-h-96 opacity-100 mt-2' : 'max-h-0 opacity-0'}`},
      e('p',{className:'italic mb-2'},`"${cita}"`),
      e('p',null,reflexion),
      e('div',{className:'flex space-x-2 mt-2'},
        e('a',{href:'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href), target:'_blank', className:'share-btn bg-blue-700 hover:bg-blue-600'},
          e('i',{className:'bi bi-facebook text-white'})
        ),
        e('a',{href:'https://www.instagram.com/', target:'_blank', className:'share-btn bg-pink-600 hover:bg-pink-500'},
          e('i',{className:'bi bi-instagram text-white'})
        ),
        e('a',{href:'https://api.whatsapp.com/send?text='+encodeURIComponent(cita+' - '+reflexion), target:'_blank', className:'share-btn bg-green-600 hover:bg-green-500'},
          e('i',{className:'bi bi-whatsapp text-white'})
        )
      )
    )
  );
}

// Floating Categories con borde
function FloatingCategories({categories, setCategory, category}) {
  const [open, setOpen] = React.useState(false);
  return e('div',{className:'fixed bottom-24 right-6 z-50 flex flex-col items-end'},
    e('button',{className:'bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg hover:scale-110 transition transform mb-2', onClick:()=>setOpen(!open)}, 'Categorías'),
    open && e('div',{className:'flex flex-col space-y-2 transition-all duration-300'},
      categories.map((cat,i)=>{
        const color = categoryColors[normalize(cat)] || 'bg-gray-600';
        return e('button',{key:i, className:`${color} category-btn text-white px-3 py-1 rounded whitespace-nowrap`, onClick:()=>{setCategory(cat); setOpen(false);}},cat)
      })
    )
  );
}

// Render
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); window.deferredPrompt = e; });
</script>

</body>
</html>
