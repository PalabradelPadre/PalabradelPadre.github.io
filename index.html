<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<!-- Quasar Framework CDN -->
<link href="https://cdn.jsdelivr.net/npm/quasar@2.16.7/dist/quasar.prod.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2.16.7/dist/quasar.umd.prod.js"></script>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin:0; padding:0;
  background: linear-gradient(135deg,#1e1e2f,#2a2a3d);
  font-family: 'Segoe UI', sans-serif;
  color:white;
}
.q-btn { font-weight:bold; }
.q-card { cursor:pointer; transition: transform 0.3s; }
.q-card.expanded { transform: scale(1.03); }
.category-btn { white-space: nowrap; margin:5px; }
</style>
</head>
<body>

<div id="app">
  <q-layout view="hHh Lpr fFf">

    <!-- Header -->
    <q-header elevated>
      <q-toolbar>
        <q-toolbar-title>Palabra del Padre</q-toolbar-title>
        <q-btn color="green" label="Instalar" icon="download" @click="instalarPWA" flat dense round />
      </q-toolbar>
    </q-header>

    <!-- Page Content -->
    <q-page padding>

      <!-- Top Acompañamiento Button -->
      <div style="text-align:center; margin:10px;">
        <q-btn color="purple" label="Acompañamiento" icon="chat" @click="abrirMessenger" unelevated rounded />
      </div>

      <!-- Floating Category Buttons -->
      <div style="position:fixed; bottom:80px; right:20px; display:flex; flex-direction:column; align-items:flex-end;">
        <q-btn v-for="cat in categorias" :key="cat.id" :label="cat.label" color="indigo" class="category-btn" @click="filtrar(cat.id)" rounded unelevated />
      </div>

      <!-- Cards -->
      <q-card v-for="item in cardsFiltradas" :key="item.titulo" :class="{'expanded': item.expanded}" flat bordered style="margin:10px;" @click="toggleExpand(item)">
        <q-card-section>
          <div class="text-h6">{{ item.titulo }}</div>
          <div class="text-subtitle2">{{ item.versiculo }}</div>
        </q-card-section>
        <q-separator />
        <q-card-section v-if="item.expanded">
          <p><em>"{{ item.cita }}"</em></p>
          <p>{{ item.reflexion }}</p>
          <div style="display:flex; gap:10px;">
            <q-btn flat round icon="facebook" @click.stop="shareFB(item)" />
            <q-btn flat round icon="instagram" @click.stop="shareIG(item)" />
            <q-btn flat round icon="whatsapp" @click.stop="shareWA(item)" />
          </div>
        </q-card-section>
      </q-card>

      <!-- Bottom Donate Button -->
      <div style="text-align:center; margin:10px;">
        <q-btn color="white" text-color="#111" icon="attach_money" label="Donar" @click="donar" rounded unelevated />
      </div>

    </q-page>

  </q-layout>
</div>

<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const deferredPrompt = ref(null);

    // --- PWA Install ---
    window.addEventListener('beforeinstallprompt', e=>{
      e.preventDefault();
      deferredPrompt.value = e;
    });
    const instalarPWA = async ()=>{
      if(deferredPrompt.value){
        deferredPrompt.value.prompt();
        await deferredPrompt.value.userChoice;
        deferredPrompt.value = null;
      }
    };

    // --- Cards Data ---
    const cards = ref([
      {categoria:'ansiedad', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, en toda ocasión, con oración y ruego, presenten sus peticiones a Dios y denle gracias.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.', expanded:false},
      {categoria:'tentacion', titulo:'Resiste la tentación', versiculo:'1 Corintios 10:13', cita:'No les ha sobrevenido ninguna tentación que no sea humana; pero fiel es Dios, que no permitirá que ustedes sean tentados más allá de lo que puedan resistir.', reflexion:'Recuerda que Dios te da la fuerza para superar cualquier tentación.', expanded:false},
      {categoria:'motivacion', titulo:'Actúa con bondad', versiculo:'Gálatas 6:9', cita:'No nos cansemos de hacer el bien, porque a su debido tiempo cosecharemos si no nos damos por vencidos.', reflexion:'Cada acto de bondad te acerca más a Dios y ayuda a los demás.', expanded:false},
      {categoria:'caridad', titulo:'Ayuda a otros', versiculo:'Mateo 25:40', cita:'De cierto les digo que todo lo que hicieron por uno de estos mis hermanos más pequeños, a mí me lo hicieron.', reflexion:'Hacer caridad es servir a Dios directamente.', expanded:false},
      {categoria:'confianza', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5-6', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y Él guiará tus caminos.', expanded:false}
    ]);

    const categorias = ref([
      {id:'ansiedad', label:'Ansiedad'},
      {id:'tentacion', label:'Tentación'},
      {id:'motivacion', label:'Motivación'},
      {id:'caridad', label:'Caridad'},
      {id:'confianza', label:'Confianza'},
      {id:'todas', label:'Todas'}
    ]);

    const cardsFiltradas = ref([...cards.value]);

    const filtrar = (cat)=>{
      if(cat==='todas') cardsFiltradas.value = [...cards.value];
      else cardsFiltradas.value = cards.value.filter(c=>c.categoria===cat);
    };

    const toggleExpand = (item)=>{ item.expanded = !item.expanded; };

    // --- Sharing ---
    const shareFB = (item)=>{ window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`,'_blank'); };
    const shareIG = (item)=>{ window.open(`https://www.instagram.com/`,'_blank'); };
    const shareWA = (item)=>{ window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(item.cita+' - '+item.reflexion)}`,'_blank'); };

    const abrirMessenger = ()=>{ window.open('https://m.me/tuPaginaMessenger','_blank'); };
    const donar = ()=>{ window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank'); };

    return {cardsFiltradas,categorias,filtrar,toggleExpand,shareFB,shareIG,shareWA,instalarPWA,abrirMessenger,donar};
  }
}).use(Quasar).mount('#app');
</script>

</body>
</html>
