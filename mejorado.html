<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  color:white;
}

header {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:1rem;
  background:#1f1f2f;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}

header h1 {
  font-size:2rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
}

input[type="text"] {
  width:90%;
  max-width:600px;
  padding:0.75rem;
  border-radius:12px;
  border:none;
  margin:1rem auto;
  display:block;
  font-size:1rem;
  color:#3b1f5f;
}

.card-container {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
  gap:1rem;
  padding:1rem;
}

.card {
  background-color: rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  border-radius:1rem;
  border:1px solid rgba(255,255,255,0.3);
  padding:1rem;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  cursor:pointer;
  transition: all 0.3s;
  position: relative;
}

.card.expanded { background-color: rgba(255,255,255,0.3); transform: scale(1.03); }

.card h2 { margin:0 0 0.25rem 0; }
.card h3 { margin:0 0 0.5rem 0; font-size:0.85rem; color:#eee; }
.card p { margin:0.25rem 0; }

.card .share-buttons { display:flex; gap:0.5rem; margin-top:0.5rem; }

.share-btn {
  width:36px; height:36px;
  display:flex; justify-content:center; align-items:center;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.5);
  transition:transform 0.2s;
  cursor:pointer;
}

.share-btn:hover { transform: scale(1.2); }

.floating-btn {
  position:fixed; bottom:1rem; right:1rem;
  background-color: rgba(0,123,255,0.85);
  padding:0.5rem 1rem;
  border-radius:9999px;
  display:flex; align-items:center; gap:0.5rem;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}

.floating-btn:hover { transform: scale(1.05); }

.evangelizar-btn {
  position:fixed; bottom:1rem; left:1rem;
  background-color:#ffcc00; color:#3b1f5f;
  padding:0.75rem 1.25rem;
  border-radius:9999px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  cursor:pointer;
  transition: transform 0.2s;
}

.evangelizar-btn:hover { transform: scale(1.05); }

.highlight { background-color: yellow; color:black; font-weight:bold; }

.category-btn {
  padding:0.5rem 1rem; border-radius:12px; margin-top:0.5rem;
  font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:0.5rem;
}

.category-btn:hover { transform:scale(1.05); }

.modal-bg {
  position:fixed; inset:0;
  background-color: rgba(0,0,0,0.5);
  display:flex; justify-content:center; align-items:center;
  z-index:100;
}

.modal-content {
  background:white; color:#3b1f5f; padding:1rem; border-radius:1rem; max-width:300px; width:90%;
}

.footer {
  text-align:center;
  padding:1rem;
  color:#f3f4f6;
  font-style:italic;
  font-size:0.9rem;
  opacity:0;
  transition:opacity 0.5s;
}

.footer.show { opacity:1; }
</style>
</head>
<body>

<header>
<h1><i class="bi bi-book-fill text-yellow-400"></i> Palabra del Padre <i class="bi bi-dove-fill"></i></h1>
</header>

<input type="text" id="searchInput" placeholder="Busca por palabra, versículo o tema...">

<div class="card-container" id="cardsContainer"></div>

<div class="floating-btn" id="categoriesBtn"><i class="bi bi-list"></i> Categorías</div>

<button class="floating-btn" id="installBtn" style="bottom:5rem; right:1rem;">Instalar App 📲</button>
<button class="evangelizar-btn" id="evangelizarBtn"><i class="bi bi-book-half"></i> Evangelizar</button>

<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal-content">
    <h2>Evangelizar</h2>
    <p>Comparte tus reflexiones o apoya la app:</p>
    <div style="display:flex; flex-direction:column; gap:0.5rem;">
      <a href="https://m.me/tucanal" target="_blank" class="category-btn bg-blue-600 text-white">Messenger</a>
      <a href="https://paypal.me/tucuenta" target="_blank" class="category-btn bg-green-600 text-white">Donar</a>
      <a href="https://tuapp.com/version2" target="_blank" class="category-btn bg-purple-600 text-white">Versión 2</a>
    </div>
    <button onclick="closeModal()" class="category-btn bg-gray-400 text-white">Cerrar</button>
  </div>
</div>

<footer class="footer show" id="footer">“Porque el que siembra generosamente, también segará generosamente.” — Lucas 6:38</footer>

<script>
// ----------------- DATOS -----------------
const categories = [
  {id:'todas', label:'Todas', color:'bg-indigo-500/50'},
  {id:'paz', label:'Paz', color:'bg-blue-400/50'},
  {id:'fortaleza', label:'Fortaleza', color:'bg-red-400/50'},
  {id:'inspiracion', label:'Inspiración', color:'bg-green-400/50'},
  {id:'amor', label:'Amor al prójimo', color:'bg-yellow-300/50'},
  {id:'fe', label:'Fe y Confianza', color:'bg-purple-400/50'},
  {id:'devocion', label:'Devoción', color:'bg-pink-400/50'},
  {id:'evangelio', label:'Evangelio', color:'bg-orange-400/50'}
];

const cardsData = [
  {categoria:'paz', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, presenten sus peticiones a Dios en toda oración y súplica.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.'},
  {categoria:'amor', titulo:'Ama al prójimo', versiculo:'1 Juan 3:18', cita:'Hijos míos, no amemos de palabra ni de lengua, sino con hechos y en verdad.', reflexion:'El amor se demuestra con acciones.'},
  {categoria:'fe', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y Él guiará tus caminos.'},
  {categoria:'inspiracion', titulo:'Sé valiente', versiculo:'Josué 1:9', cita:'Sé fuerte y valiente; no temas ni te acobardes.', reflexion:'Dios está contigo en cada desafío.'}
];

// ----------------- UTILS -----------------
function normalize(str){ return (str||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,''); }
function highlight(text, search){ if(!search) return text; return text.replace(new RegExp(`(${search})`, 'gi'), m=>`<span class="highlight">${m}</span>`); }

// ----------------- RENDER -----------------
const container = document.getElementById('cardsContainer');
const searchInput = document.getElementById('searchInput');
let currentCategory = 'todas';

function renderCards(){
  container.innerHTML='';
  const filter = normalize(searchInput.value);
  const filtered = cardsData.filter(c=>{
    const content = normalize(c.titulo+c.versiculo+c.cita+c.reflexion);
    const catMatch = currentCategory==='todas'?true:c.categoria===currentCategory;
    return content.includes(filter) && catMatch;
  });
  filtered.forEach(c=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <h2>${highlight(c.titulo, searchInput.value)}</h2>
      <h3>${highlight(c.versiculo, searchInput.value)}</h3>
      <p>${highlight(c.cita, searchInput.value)}</p>
      <p>${highlight(c.reflexion, searchInput.value)}</p>
      <div class="share-buttons">
        <div class="share-btn" onclick="shareCard('whatsapp','${encodeURIComponent(c.titulo+' - '+c.reflexion)}')"><i class="bi bi-whatsapp text-green-500"></i></div>
        <div class="share-btn" onclick="shareCard('facebook','${encodeURIComponent(c.titulo+' - '+c.reflexion)}')"><i class="bi bi-facebook text-blue-500"></i></div>
      </div>
    `;
    card.addEventListener('click', ()=> card.classList.toggle('expanded'));
    container.appendChild(card);
  });
}

searchInput.addEventListener('input', renderCards);

// ----------------- SHARE -----------------
function shareCard(platform,text){
  const url=window.location.href;
  if(platform==='whatsapp') window.open(`https://api.whatsapp.com/send?text=${text} - ${url}`,'_blank');
  if(platform==='facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${text}`,'_blank');
}

// ----------------- CATEGORIES -----------------
const categoriesBtn = document.getElementById('categoriesBtn');
let categoriesOpen=false;
categoriesBtn.addEventListener('click',()=>{
  if(categoriesOpen){
    document.querySelectorAll('.category-btn').forEach(e=>e.remove());
    categoriesOpen=false;
    return;
  }
  const btns = categories.map(cat=>{
    const b = document.createElement('div');
    b.className='category-btn '+cat.color;
    b.innerHTML=cat.label;
    b.addEventListener('click',()=>{
      currentCategory=cat.id; renderCards(); document.querySelectorAll('.category-btn').forEach(e=>e.remove()); categoriesOpen=false;
    });
    document.body.appendChild(b);
    return b;
  });
  categoriesOpen=true;
});

// ----------------- MODAL EVANGELIZAR -----------------
const modal = document.getElementById('modal');
document.getElementById('evangelizarBtn').addEventListener('click',()=>modal.style.display='flex');
function closeModal(){ modal.style.display='none'; }

// ----------------- PWA INSTALL -----------------
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display='flex';
});
installBtn.addEventListener('click',async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
});

// ----------------- INIT -----------------
renderCards();
</script>

</body>
</html>
