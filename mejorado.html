<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre PRO</title>

<!-- Tailwind CSS opcional para utilidades -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  color: white;
}

header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  background-color: #1f1f2f;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

header h1 {
  font-size: 2rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

input[type="text"] {
  width: 90%;
  max-width: 600px;
  padding: 0.75rem;
  border-radius: 12px;
  border: none;
  margin: 1rem auto;
  display: block;
  font-size: 1rem;
  color: #3b1f5f;
}

.card-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  padding: 1rem;
}

.card {
  background-color: rgba(255,255,255,0.2);
  backdrop-filter: blur(12px);
  border-radius: 1rem;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 1rem;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.03);
}

.card h2 {
  margin: 0 0 0.25rem 0;
}

.card h3 {
  margin: 0 0 0.5rem 0;
  font-size: 0.85rem;
  color: #eee;
}

.card p {
  margin: 0.25rem 0;
}

.card .share-buttons {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.share-btn {
  width: 36px;
  height: 36px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.5);
  transition: transform 0.2s;
  cursor: pointer;
}

.share-btn:hover { transform: scale(1.2); }

.floating-btn {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background-color: rgba(0,123,255,0.85);
  padding: 0.5rem 1rem;
  border-radius: 9999px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}

.floating-btn:hover { transform: scale(1.05); }

.evangelizar-btn {
  position: fixed;
  bottom: 1rem;
  left: 1rem;
  background-color: #ffcc00;
  color: #3b1f5f;
  padding: 0.75rem 1.25rem;
  border-radius: 9999px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.2s;
}

.evangelizar-btn:hover { transform: scale(1.05); }

.highlight { background-color: yellow; color: black; font-weight: bold; }

.footer {
  text-align: center;
  padding: 1rem;
  color: #f3f4f6;
  font-style: italic;
  font-size: 0.9rem;
  opacity: 0;
  transition: opacity 0.5s;
}

.footer.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1><i class="bi bi-book-fill text-yellow-400"></i> Palabra del Padre <i class="bi bi-dove-fill"></i></h1>
</header>

<input type="text" id="searchInput" placeholder="Busca por palabra, versículo o tema...">

<div class="card-container" id="cardsContainer"></div>

<button class="floating-btn" id="installBtn">Instalar App 📲</button>
<button class="evangelizar-btn" id="evangelizarBtn"><i class="bi bi-book-half"></i> Evangelizar</button>

<footer class="footer" id="footer">“Porque el que siembra generosamente, también segará generosamente.” — Lucas 6:38</footer>

<script>
// ----------------- DATOS DE CARDS -----------------
const cardsData = [
  {categoria:'paz', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, presenten sus peticiones a Dios en toda oración y súplica.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.'},
  {categoria:'amor', titulo:'Ama al prójimo', versiculo:'1 Juan 3:18', cita:'Hijos míos, no amemos de palabra ni de lengua, sino con hechos y en verdad.', reflexion:'El amor se demuestra con acciones.'},
  {categoria:'fe', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5', cita:'Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia.', reflexion:'Ríndete a Dios y Él guiará tus caminos.'},
  {categoria:'inspiracion', titulo:'Sé valiente', versiculo:'Josué 1:9', cita:'Sé fuerte y valiente; no temas ni te acobardes.', reflexion:'Dios está contigo en cada desafío.'}
];

// ----------------- UTILS -----------------
function normalize(str){ return (str||'').toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,''); }

function highlight(text, search){
  if(!search) return text;
  const regex = new RegExp(`(${search})`, 'gi');
  return text.replace(regex, m => `<span class="highlight">${m}</span>`);
}

// ----------------- RENDER CARDS -----------------
const container = document.getElementById('cardsContainer');
const searchInput = document.getElementById('searchInput');

function renderCards(filter=''){
  container.innerHTML = '';
  const searchNorm = normalize(filter);
  const filtered = cardsData.filter(c => normalize(c.titulo+c.cita+c.reflexion+c.versiculo).includes(searchNorm));
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2>${highlight(c.titulo, filter)}</h2>
      <h3>${highlight(c.versiculo, filter)}</h3>
      <p>${highlight(c.cita, filter)}</p>
      <p>${highlight(c.reflexion, filter)}</p>
      <div class="share-buttons">
        <div class="share-btn" onclick="shareCard('whatsapp','${encodeURIComponent(c.titulo+' - '+c.reflexion)}')"><i class="bi bi-whatsapp text-green-500"></i></div>
        <div class="share-btn" onclick="shareCard('facebook','${encodeURIComponent(c.titulo+' - '+c.reflexion)}')"><i class="bi bi-facebook text-blue-500"></i></div>
      </div>
    `;
    container.appendChild(card);
  });
}

// ----------------- SHARE FUNCTION -----------------
function shareCard(platform, text){
  const url = window.location.href;
  if(platform==='whatsapp') window.open(`https://api.whatsapp.com/send?text=${text} - ${url}`, '_blank');
  if(platform==='facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${text}`, '_blank');
}

// ----------------- SEARCH -----------------
searchInput.addEventListener('input', e => renderCards(e.target.value));

// ----------------- PWA INSTALL PROMPT -----------------
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
});

// ----------------- EVANGELIZAR -----------------
document.getElementById('evangelizarBtn').addEventListener('click', ()=>alert('Modo Evangelizar abierto.'));

// ----------------- FOOTER -----------------
const footer = document.getElementById('footer');
footer.classList.add('show');

// ----------------- INITIAL RENDER -----------------
renderCards();
</script>

</body>
</html>
