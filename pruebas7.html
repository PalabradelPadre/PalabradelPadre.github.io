<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}
.card-glass {
  backdrop-filter: blur(10px);
  background-color: rgba(255,255,255,0.1);
  border-radius: 0.75rem;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1rem;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.share-btn { 
  width: 36px; height: 36px; 
  display:flex; align-items:center; justify-content:center; 
  border-radius:50%; 
  transition: transform 0.2s; 
  border: 1px solid rgba(255,255,255,0.4); 
}
.share-btn:hover { transform: scale(1.2); }
.highlight { background-color: yellow; color: black; font-weight: bold; }
.carousel-container {
  overflow-x: auto;
  display: flex;
  gap: 1rem;
  padding: 1rem;
  scroll-behavior: smooth;
}
.carousel-container::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

// Datos de ejemplo de cards
const cardsData = [
  {categoria:'paz', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; más bien, presenten sus peticiones a Dios...', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.'},
  {categoria:'fortaleza', titulo:'Sé firme', versiculo:'Efesios 6:11', cita:'Pónganse toda la armadura de Dios para poder resistir los embates...', reflexion:'Mantente firme con la ayuda de Dios.'},
  {categoria:'amor', titulo:'Ama al prójimo', versiculo:'1 Juan 3:18', cita:'Hijos míos, no amemos de palabra ni de lengua...', reflexion:'El amor se demuestra con acciones.'},
  {categoria:'inspiracion', titulo:'Levántate con fe', versiculo:'Isaías 40:31', cita:'Pero los que esperan al Señor renovarán sus fuerzas...', reflexion:'La fe te renueva y fortalece.'},
  {categoria:'fe', titulo:'Confía en el Señor', versiculo:'Proverbios 3:5-6', cita:'Confía en el Señor con todo tu corazón...', reflexion:'Ríndete a Dios y Él guiará tus caminos.'}
];

const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-600/50'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/30'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/30'},
  {id:'inspiracion', label:'Inspiración', icon:'bi-lightning-fill', color:'bg-green-400/30'},
  {id:'amor', label:'Amor al prójimo', icon:'bi-heart-fill', color:'bg-yellow-300/30'},
  {id:'fe', label:'Fe y Confianza', icon:'bi-star-fill', color:'bg-purple-400/30'},
  {id:'devocion', label:'Devoción', icon:'bi-book-fill', color:'bg-pink-400/30'}
];

function normalize(str){ return (str||'').normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }

function highlightText(text, search){
  if(!search) return text;
  const re = new RegExp(`(${search.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&')})`, 'gi');
  const parts = text.split(re);
  return parts.map((part,i)=> re.test(part) ? e('span',{key:i,className:'highlight'},part) : part);
}

function App(){
  const [category,setCategory] = React.useState('todas');
  const [search,setSearch] = React.useState('');
  const [installPrompt,setInstallPrompt] = React.useState(null);

  React.useEffect(()=>{
    window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); setInstallPrompt(e); });
  },[]);

  const handleInstall = async ()=>{
    if(!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice;
  };

  // Filtrado
  let filteredCards = category==='todas'? cardsData : cardsData.filter(c=>normalize(c.categoria)===category);
  if(search){
    const ns = normalize(search);
    filteredCards = filteredCards.filter(c=>
      normalize(c.titulo).includes(ns) || normalize(c.cita).includes(ns) || normalize(c.reflexion).includes(ns)
    );
  }

  return e('div',{className:'min-h-screen flex flex-col'},
    // HEADER
    e('header',{className:'flex justify-center items-center p-4 bg-gray-800 shadow relative'},
      e('h1',{className:'text-2xl font-bold flex items-center gap-2'},
        e('i',{className:'bi bi-book-fill text-yellow-400'}),'Palabra del Padre', e('i',{className:'bi bi-dove-fill text-white'})
      )
    ),
    // BUSCADOR
    e('div',{className:'mx-4 my-2'},
      e('input',{
        type:'text',
        placeholder:'Busca por palabra, versículo o tema...',
        value: search,
        onChange:(e)=>setSearch(e.target.value),
        className:'w-full p-3 rounded-xl text-gray-900 font-medium placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-400 transition'
      })
    ),

    // CAROUSEL DE CARDS
    e('div',{className:'carousel-container'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card, search}))
    ),

    // BOTÓN DE ACOMPAÑAMIENTO
    e('div',{className:'text-center mt-4'},
      e('button',{className:'flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto', onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento'
      )
    ),

    e(FloatingCategories,{categories, setCategory, category}),

    e('footer',{className:'text-center py-4 text-gray-300'},'Gracias por apoyar esta herramienta de crecimiento espiritual.')
  );
}

function Card({titulo, versiculo, cita, reflexion, categoria, search}){
  const [expanded,setExpanded] = React.useState(false);
  const catObj = categories.find(c=>normalize(c.id)===normalize(categoria)) || {color:'bg-gray-600/30'};
  const cardRef = React.useRef();

  React.useEffect(()=>{
    // Expandir si hay búsqueda
    if(search) setExpanded(true);
    else setExpanded(false);
  },[search]);

  const shareCard = (platform)=>{
    html2canvas(cardRef.current).then(canvas=>{
      canvas.toBlob(blob=>{
        const file = new File([blob],'card.png',{type:'image/png'});
        const url = URL.createObjectURL(file);
        if(platform==='whatsapp'){
          const text = encodeURIComponent(reflexion+' - '+window.location.href);
          window.open(`https://api.whatsapp.com/send?text=${text}`,'_blank');
        } else if(platform==='facebook'){
          const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`;
          window.open(fbUrl,'_blank');
        } else if(platform==='instagram'){
          alert('Instagram no permite compartir directamente desde web. Descarga la imagen y compártela.');
          window.open(url,'_blank');
        }
      });
    });
  };

  return e('div',{
    ref:cardRef,
    className:`card-glass shadow transform transition-all duration-300 hover:scale-105 cursor-pointer ${catObj.color}`,
    onClick:()=>setExpanded(!expanded)
  },
    e('div',null,
      e('h2',{className:'text-lg font-bold flex items-center gap-1'}, highlightText(titulo, search)),
      e('h3',{className:'text-sm text-gray-200'}, versiculo),
      e('div',{className:`overflow-hidden transition-all duration-500 ${expanded?'max-h-96 opacity-100 mt-2':'max-h-0 opacity-0'}`},
        e('p',{className:'italic mb-2'}, highlightText(`"${cita}"`, search)),
        e('p',null, highlightText(reflexion, search))
      )
    ),
    // FOOTER CON BOTONES
    e('div',{className:'flex space-x-2 mt-4'},
      e('button',{className:'share-btn bg-blue-700 hover:bg-blue-600', onClick:(e)=>{e.stopPropagation(); shareCard('facebook');}},
        e('i',{className:'bi bi-facebook text-white'})
      ),
      e('button',{className:'share-btn bg-pink-600 hover:bg-pink-500', onClick:(e)=>{e.stopPropagation(); shareCard('instagram');}},
        e('i',{className:'bi bi-instagram text-white'})
      ),
      e('button',{className:'share-btn bg-green-600 hover:bg-green-500', onClick:(e)=>{e.stopPropagation(); shareCard('whatsapp');}},
        e('i',{className:'bi bi-whatsapp text-white'})
      ),
      e('button',{className:'ml-auto px-2 py-1 bg-white text-gray-900 rounded hover:bg-gray-200 text-sm', onClick:(e)=>{e.stopPropagation(); alert('Abrir Mi Diario Espiritual');}},
        e('i',{className:'bi bi-journal-text mr-1'}),'Mi Diario Espiritual'
      )
    )
  );
}

function FloatingCategories({categories,setCategory,category}){
  const [open,setOpen] = React.useState(false);

  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{
      className:'bg-white/10 backdrop-blur-lg border border-white/20 text-white px-4 py-3 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.3)] flex items-center gap-2 mb-2 hover:scale-110 transition-all duration-300',
      onClick:()=>setOpen(!open)
    },
      e('i',{className:`bi ${open?'bi-x-lg':'bi-list'} text-white/80 text-lg`}),
      'Palabra'
    ),
    open && e('div',{className:'flex flex-col space-y-2'},
      categories.map((cat,i)=>e('button',{
        key:i,
        onClick:()=>{setCategory(cat.id); setOpen(false);},
        className:`flex items-center gap-2 px-4 py-2 rounded-full backdrop-blur-md border border-white/20 ${cat.color} text-white/90 shadow-lg hover:scale-105 hover:bg-white/20 transition-all duration-200`
      },
        e('i',{className:cat.icon+' text-white/80'}), cat.label
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
