<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

#app{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.card{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:2rem;
  scroll-snap-align:start;
  transition:0.5s;
}

h1{font-size:1.5rem;}
p{max-width:600px}

.overlay{
  position:absolute;
  bottom:100px;
  right:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  background:rgba(0,0,0,0.4);
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

.floating{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.categories{
  position:fixed;
  bottom:70px;
  left:20px;
  display:none;
  flex-direction:column;
  gap:5px;
}

.categories button{
  padding:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.show{display:flex}

.fade{
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<div id="app"></div>

<div class="floating" id="toggleCat">☰ Categorías</div>
<div class="categories" id="categories"></div>

<script>
// =====================
// 🎨 Colores por categoría
// =====================
const colors = {
  paz:"#4facfe",
  fortaleza:"#ff6a6a",
  amor:"#fbc2eb",
  fe:"#a18cd1",
  evangelio:"#f6d365",
  todas:"#333"
};

// =====================
// 📊 Estado
// =====================
let data = [];
let category = "todas";

// =====================
// 📥 Cargar datos
// =====================
fetch("cards.json")
.then(r=>r.json())
.then(json=>{
  data = json;
  render();
});

// =====================
// 🎛 Categorías
// =====================
const catBox = document.getElementById("categories");

["todas","paz","fortaleza","amor","fe","evangelio"]
.forEach(cat=>{
  const btn = document.createElement("button");
  btn.textContent = cat;
  btn.onclick = ()=>{
    category = cat;
    render();
    catBox.classList.remove("show");
  };
  catBox.appendChild(btn);
});

document.getElementById("toggleCat").onclick = ()=>{
  catBox.classList.toggle("show");
};

// =====================
// 🎨 Render tipo TikTok
// =====================
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  let filtered = data.filter(c=>{
    if(category==="todas") return true;
    return c.categoria === category;
  });

  filtered.forEach(c=>{
    const card = document.createElement("div");
    card.className = "card fade";

    // fondo dinámico
    card.style.background = `linear-gradient(180deg, ${colors[c.categoria] || "#333"}, #000)`;

    const title = document.createElement("h1");
    title.textContent = c.titulo;

    const verse = document.createElement("h3");
    verse.textContent = c.versiculo;

    const cita = document.createElement("p");
    cita.textContent = c.cita;

    const reflex = document.createElement("p");
    reflex.textContent = c.reflexion;

    const overlay = document.createElement("div");
    overlay.className = "overlay";

    const share = document.createElement("button");
    share.className = "btn";
    share.textContent = "📤";

    const diario = document.createElement("button");
    diario.className = "btn";
    diario.textContent = "📓";

    share.onclick = ()=>{
      const text = `${c.cita}\n${c.versiculo}`;
      window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(text));
    };

    diario.onclick = ()=>{
      window.location.href = "/midiario.html";
    };

    overlay.appendChild(share);
    overlay.appendChild(diario);

    card.appendChild(title);
    card.appendChild(verse);
    card.appendChild(cita);
    card.appendChild(reflex);
    card.appendChild(overlay);

    app.appendChild(card);
  });
}
</script>

</body>
</html>
