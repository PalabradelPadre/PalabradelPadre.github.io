<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

#app{
  height:100vh;
  position:relative;
}

.card{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:2rem;
  transition:transform 0.4s ease, opacity 0.4s;
}

.overlay{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  background:rgba(0,0,0,0.4);
  border:none;
  color:white;
  padding:12px;
  border-radius:50%;
  font-size:18px;
}

.fav.active{
  background:red;
}

.floating{
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  color:black;
  padding:10px 15px;
  border-radius:20px;
}

.categories{
  position:fixed;
  bottom:70px;
  left:20px;
  display:none;
  flex-direction:column;
  gap:5px;
}

.categories button{
  padding:8px;
  border:none;
  border-radius:10px;
}

.show{display:flex}
</style>
</head>

<body>

<div id="app"></div>

<div class="floating" id="toggleCat">☰</div>
<div class="categories" id="categories"></div>

<script>
// =====================
// 🎨 CONFIG
// =====================
const colors = {
  paz:"#4facfe",
  fortaleza:"#ff6a6a",
  amor:"#fbc2eb",
  fe:"#a18cd1",
  evangelio:"#f6d365",
  todas:"#333"
};

// =====================
// 📊 STATE
// =====================
let data = [];
let filtered = [];
let index = 0;
let category = "todas";

// favoritos
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

// =====================
// 📥 LOAD
// =====================
fetch("cards.json")
.then(r=>r.json())
.then(json=>{
  data = json;
  applyFilter();
});

// =====================
// 🎛 CATEGORÍAS
// =====================
const catBox = document.getElementById("categories");

["todas","paz","fortaleza","amor","fe","evangelio"]
.forEach(cat=>{
  const b = document.createElement("button");
  b.textContent = cat;
  b.onclick = ()=>{
    category = cat;
    applyFilter();
    catBox.classList.remove("show");
  };
  catBox.appendChild(b);
});

document.getElementById("toggleCat").onclick = ()=>{
  catBox.classList.toggle("show");
};

// =====================
// 🔄 FILTER
// =====================
function applyFilter(){
  filtered = data.filter(c=>{
    if(category==="todas") return true;
    return c.categoria === category;
  });
  index = 0;
  render();
}

// =====================
// 🎨 RENDER PRO
// =====================
function createCard(c, pos){
  const card = document.createElement("div");
  card.className = "card";

  card.style.background = `linear-gradient(180deg, ${colors[c.categoria]||"#333"}, #000)`;
  card.style.transform = `translateY(${pos*100}%)`;

  const t = document.createElement("h2");
  t.textContent = c.titulo;

  const v = document.createElement("h4");
  v.textContent = c.versiculo;

  const p = document.createElement("p");
  p.textContent = c.cita;

  const r = document.createElement("p");
  r.textContent = c.reflexion;

  const overlay = document.createElement("div");
  overlay.className = "overlay";

  const share = document.createElement("button");
  share.className = "btn";
  share.textContent = "📤";

  const fav = document.createElement("button");
  fav.className = "btn fav";
  fav.textContent = "❤️";

  if(favorites.includes(c.id)) fav.classList.add("active");

  share.onclick = ()=>{
    const text = `${c.cita}\n${c.versiculo}`;
    window.open("https://api.whatsapp.com/send?text="+encodeURIComponent(text));
  };

  fav.onclick = ()=>{
    if(favorites.includes(c.id)){
      favorites = favorites.filter(f=>f!==c.id);
      fav.classList.remove("active");
    }else{
      favorites.push(c.id);
      fav.classList.add("active");
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
  };

  overlay.appendChild(share);
  overlay.appendChild(fav);

  card.appendChild(t);
  card.appendChild(v);
  card.appendChild(p);
  card.appendChild(r);
  card.appendChild(overlay);

  return card;
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  if(!filtered.length) return;

  // solo 3 cards (performance PRO)
  const prev = filtered[index-1];
  const current = filtered[index];
  const next = filtered[index+1];

  if(prev) app.appendChild(createCard(prev,-1));
  app.appendChild(createCard(current,0));
  if(next) app.appendChild(createCard(next,1));
}

// =====================
// 📱 SWIPE PRO
// =====================
let startY = 0;

document.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
  let endY = e.changedTouches[0].clientY;
  let diff = startY - endY;

  if(diff > 50 && index < filtered.length-1){
    index++;
    render();
  }

  if(diff < -50 && index > 0){
    index--;
    render();
  }
});

// =====================
// 🖱 DESKTOP SCROLL
// =====================
document.addEventListener("wheel", e=>{
  if(e.deltaY > 0 && index < filtered.length-1){
    index++;
    render();
  } else if(e.deltaY < 0 && index > 0){
    index--;
    render();
  }
});
</script>

</body>
</html>
