<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}

.card-glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border-radius: 1rem;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1.2rem;
  transition: all 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
.card-glass:hover { transform: scale(1.05); }

.glow {
  box-shadow: 0 0 15px rgba(255,255,255,0.15);
}

.share-btn {
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.4);
  transition:0.2s;
}
.share-btn:hover { transform: scale(1.2); }

.highlight { background: yellow; color:black; }

.floating-btn {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  padding:0.6rem 1rem;
  border-radius:9999px;
  display:flex;
  align-items:center;
  gap:0.5rem;
  transition:0.3s;
}
.floating-btn:hover { transform: scale(1.1); }

</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-500/40'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/40'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/40'},
  {id:'amor', label:'Amor', icon:'bi-heart-fill', color:'bg-yellow-300/40'},
];

function normalize(str){
  return (str||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

function highlightText(text, search){
  if(!search) return text;
  const re = new RegExp(`(${search})`,'gi');
  return e('span',{dangerouslySetInnerHTML:{__html:text.replace(re,'<span class="highlight">$1</span>')}});
}

function App(){
  const [cards,setCards] = React.useState([]);
  const [category,setCategory] = React.useState('todas');
  const [search,setSearch] = React.useState('');
  const [favorites,setFavorites] = React.useState(()=>JSON.parse(localStorage.getItem('fav')||"[]"));

  React.useEffect(()=>{
    fetch('cards.json').then(r=>r.json()).then(setCards);
  },[]);

  React.useEffect(()=>{
    localStorage.setItem('fav',JSON.stringify(favorites));
  },[favorites]);

  let filtered = category==='todas'?cards:cards.filter(c=>normalize(c.categoria)===category);

  if(search){
    filtered = filtered.filter(c=>{
      const t = normalize(c.titulo + c.cita + c.reflexion);
      return t.includes(normalize(search));
    });
  }

  return e('div',{className:'min-h-screen flex flex-col'},

    e('header',{className:'text-center p-4 text-xl font-bold'},'✨ Palabra del Padre PRO'),

    e('input',{
      placeholder:'Buscar...',
      value:search,
      onChange:e=>setSearch(e.target.value),
      className:'mx-4 p-3 rounded-xl text-black'
    }),

    e(FloatingCategories,{categories,setCategory}),

    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filtered.map((c,i)=>e(Card,{key:i,...c,favorites,setFavorites}))
    )
  );
}

function Card({titulo,cita,reflexion,versiculo,categoria,favorites,setFavorites}){
  const [open,setOpen]=React.useState(false);
  const isFav = favorites.includes(titulo);

  const toggleFav=()=>{
    setFavorites(f=> isFav ? f.filter(x=>x!==titulo) : [...f,titulo]);
  };

  return e('div',{
    className:`card-glass glow ${open?'scale-105':''}`,
    onClick:()=>setOpen(!open)
  },

    e('div',{className:'flex justify-between'},
      e('h2',{className:'font-bold'},titulo),
      e('i',{
        className:`bi ${isFav?'bi-star-fill text-yellow-300':'bi-star'}`,
        onClick:(ev)=>{ev.stopPropagation();toggleFav();}
      })
    ),

    e('p',{className:'text-sm'},versiculo),

    e('div',{
      className:`overflow-hidden transition-all duration-500 ${open?'max-h-96 opacity-100 mt-2':'max-h-0 opacity-0'}`
    },
      e('p',null,cita),
      e('p',{className:'mt-2'},reflexion),

      e('div',{className:'flex gap-2 mt-2'},
        e('button',{className:'share-btn bg-green-600',
          onClick:(ev)=>{ev.stopPropagation();window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(cita),'_blank')}
        },e('i',{className:'bi bi-whatsapp'}))
      )
    )
  );
}

function FloatingCategories({categories,setCategory}){
  const [open,setOpen]=React.useState(false);

  return e('div',{className:'fixed bottom-6 right-6 flex flex-col items-end'},

    e('button',{
      className:'floating-btn',
      onClick:()=>setOpen(!open)
    },'☰'),

    e('div',{
      className:`transition-all duration-300 ${open?'opacity-100 scale-100':'opacity-0 scale-75 pointer-events-none'}`
    },
      categories.map((c,i)=>e('button',{
        key:i,
        onClick:()=>{setCategory(c.id);setOpen(false);},
        className:`block mt-2 px-4 py-2 rounded ${c.color}`
      },c.label))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
