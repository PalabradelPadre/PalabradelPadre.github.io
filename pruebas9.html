<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre - Nivel Pro</title>

<!-- Bootstrap Icons últimos -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
:root{
  --bg:#0f0f1a;
  --card:#ffffff10;
  --accent:#6C63FF;
  --accent2:#FFB86C;
}

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:white;
  overflow:hidden;
}

h2,h3{margin:0 0 0.5rem 0;}

#gridMode{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:1rem;
  overflow-y:auto;
  height:100vh;
  box-sizing:border-box;
}

.card{
  background:var(--card);
  backdrop-filter:blur(12px);
  padding:1rem 1.5rem;
  border-radius:1rem;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

#tiktokMode{
  display:none;
  position:fixed;
  inset:0;
  background:var(--bg);
  overflow:hidden;
}

.tiktokCard{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:2rem;
  text-align:center;
  transition: transform 0.4s ease, opacity 0.4s ease;
}

.tiktokCard h2{font-size:2rem; margin-bottom:0.5rem;}
.tiktokCard h4{opacity:0.7; margin-bottom:1rem;}
.tiktokCard p{line-height:1.5;}

/* Buscador overlay */
#searchOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:#0f0f1a;
  flex-direction:column;
  z-index:100;
}

.searchBar{
  display:flex;
  padding:1rem;
  gap:10px;
  align-items:center;
  background:#ffffff15;
  margin:1rem;
  border-radius:20px;
}

.searchBar input{
  flex:1;
  background:none;
  border:none;
  color:white;
  outline:none;
  font-size:1rem;
}

#results{
  flex:1;
  overflow-y:auto;
  padding:0 1rem 1rem 1rem;
}

.resultCard{
  background:var(--card);
  padding:1rem;
  margin-bottom:10px;
  border-radius:16px;
  cursor:pointer;
  transition: transform 0.2s, background 0.2s;
}

.resultCard:hover{
  transform:scale(1.02);
  background:#ffffff20;
}

/* Floating button y categorías */
.floatingBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  background:var(--accent2);
  color:#0f0f1a;
  padding:10px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
  z-index:50;
  display:flex;
  align-items:center;
  gap:5px;
  transition: transform 0.2s;
}

.floatingBtn:hover{transform:scale(1.05);}

.categories{
  position:fixed;
  bottom:70px;
  left:20px;
  display:none;
  flex-direction:column;
  gap:6px;
  z-index:50;
}

.categories button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  background:#ffffff15;
  color:white;
  transition:background 0.2s;
}

.categories button:hover{
  background:#ffffff25;
}

/* Topbar busqueda */
.topbar{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:60;
}

.iconBtn{
  background:#ffffff20;
  border:none;
  color:white;
  padding:10px;
  border-radius:50%;
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.iconBtn i,
.floatingBtn i{
  font-size:1.2rem;
  vertical-align:middle;
}
</style>
</head>
<body>

<!-- GRID MODE -->
<div id="gridMode"></div>

<!-- TIKTOK MODE -->
<div id="tiktokMode"></div>

<!-- BUSCADOR -->
<div id="searchOverlay">
  <div class="searchBar">
    <i class="bi bi-search"></i>
    <input type="text" id="searchInput" placeholder="Buscar palabra, versículo...">
    <button id="closeSearch" class="iconBtn"><i class="bi bi-x-lg"></i></button>
  </div>
  <div id="results"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <button class="iconBtn" id="openSearch"><i class="bi bi-search"></i></button>
</div>

<!-- FLOATING -->
<div class="floatingBtn" id="toggleCategories"><i class="bi bi-list"></i> Categorías</div>
<div class="categories" id="categoriesContainer"></div>

<script>
// ====================
// DATA
// ====================
let cardsData=[], activeIndex=0, currentMode="grid", currentCategory="todas";

// Cargar JSON
fetch("cards.json")
.then(r=>r.json())
.then(json=>{
  cardsData=json;
  renderGrid();
  populateCategories();
});

// ====================
// RENDER GRID
// ====================
function renderGrid(){
  const grid=document.getElementById("gridMode");
  grid.innerHTML="";
  cardsData
    .filter(c=>currentCategory==="todas"||c.categoria===currentCategory)
    .forEach((c,i)=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<h2>${c.titulo}</h2><h4>${c.versiculo}</h4><p>${c.cita}</p>`;
      card.onclick=()=>enterTikTok(i);
      grid.appendChild(card);
    });
}

// ====================
// TIKTOK MODE
// ====================
function enterTikTok(i){
  currentMode="tiktok";
  activeIndex=i;
  document.getElementById("gridMode").style.display="none";
  document.getElementById("tiktokMode").style.display="block";
  renderTikTok();
}

function renderTikTok(){
  const container=document.getElementById("tiktokMode");
  container.innerHTML="";

  const prevCard=cardsData[activeIndex-1];
  const curCard=cardsData[activeIndex];
  const nextCard=cardsData[activeIndex+1];

  function create(c,pos){
    if(!c) return;
    const div=document.createElement("div");
    div.className="tiktokCard";
    div.style.transform=`translateY(${pos*100}%)`;
    div.style.background=`linear-gradient(rgba(108,99,255,0.7),rgba(0,0,0,0.7))`;
    div.innerHTML=`<h2>${c.titulo}</h2><h4>${c.versiculo}</h4><p>${c.cita}</p>`;
    container.appendChild(div);
  }

  create(prevCard,-1);
  create(curCard,0);
  create(nextCard,1);
}

// Swipe TikTok
let startY=0;
document.addEventListener("touchstart",e=>{startY=e.touches[0].clientY;});
document.addEventListener("touchend",e=>{
  let diff=startY-e.changedTouches[0].clientY;
  if(diff>50 && activeIndex<cardsData.length-1){activeIndex++; renderTikTok();}
  if(diff<-50 && activeIndex>0){activeIndex--; renderTikTok();}
});

// ====================
// SEARCH
// ====================
const searchOverlay=document.getElementById("searchOverlay");
document.getElementById("openSearch").onclick=()=>{searchOverlay.style.display="flex";}
document.getElementById("closeSearch").onclick=()=>{searchOverlay.style.display="none";}

document.getElementById("searchInput").addEventListener("input",(e)=>{
  const val=e.target.value.toLowerCase();
  const results=document.getElementById("results");
  results.innerHTML="";
  cardsData.filter(c=>(
    (c.titulo+c.cita+c.reflexion+c.versiculo).toLowerCase().includes(val)
  )).forEach(c=>{
    const div=document.createElement("div");
    div.className="resultCard";
    div.innerHTML=`<strong>${c.titulo}</strong><p>${c.cita.slice(0,80)}...</p>`;
    div.onclick=()=>{
      enterTikTok(cardsData.indexOf(c));
      searchOverlay.style.display="none";
    };
    results.appendChild(div);
  });
});

// ====================
// CATEGORIES
// ====================
const catList=["todas","paz","fortaleza","amor","fe","evangelio"];
function populateCategories(){
  const container=document.getElementById("categoriesContainer");
  catList.forEach(cat=>{
    const btn=document.createElement("button");
    btn.textContent=cat;
    btn.onclick=()=>{
      currentCategory=cat;
      renderGrid();
      document.getElementById("categoriesContainer").style.display="none";
    };
    container.appendChild(btn);
  });
}

document.getElementById("toggleCategories").onclick=()=>{
  const el=document.getElementById("categoriesContainer");
  el.style.display=el.style.display==="flex"?"none":"flex";
  el.style.flexDirection="column";
};
</script>
</body>
</html>
