<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}

/* GLASS PRO */
.card-glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.08);
  border-radius: 1rem;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1.5rem;
  transition: all 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.35);
}
.card-glass:hover { transform: scale(1.04); }

/* GLOW */
.glow {
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* BOTONES */
.share-btn { 
  width: 36px; height: 36px; 
  display:flex; align-items:center; justify-content:center; 
  border-radius:50%; 
  transition: 0.2s; 
  border: 1px solid rgba(255,255,255,0.4); 
}
.share-btn:hover { transform: scale(1.2); }

/* HIGHLIGHT */
.highlight { background-color: yellow; color: black; font-weight: bold; }

/* FLOATING PRO */
.floating-btn {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:9999px;
  padding:0.6rem 1rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
  transition:0.3s;
}
.floating-btn:hover { transform: scale(1.1); }

/* ANIMACIONES */
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-600/50'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/50'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/50'},
  {id:'inspiracion', label:'Inspiración', icon:'bi-lightning-fill', color:'bg-green-400/50'},
  {id:'amor', label:'Amor al prójimo', icon:'bi-heart-fill', color:'bg-yellow-300/50'},
  {id:'fe', label:'Fe y Confianza', icon:'bi-star-fill', color:'bg-purple-400/50'},
  {id:'devocion', label:'Devoción', icon:'bi-book-fill', color:'bg-pink-400/50'},
  {id:'evangelio', label:'Evangelio', icon:'bi-calendar-event-fill', color:'bg-orange-400/50'}
];

function normalize(str){
  return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function highlightText(text, search){
  if(!search) return text;
  const words = normalize(search).split(' ').filter(Boolean);
  let result = text;
  words.forEach(word => {
    const re = new RegExp(`(${word})`, 'gi');
    result = result.replace(re, '<span class="highlight">$1</span>');
  });
  return e('span', { dangerouslySetInnerHTML: { __html: result } });
}

function App() {
  const [cardsData, setCardsData] = React.useState([]);
  const [category, setCategory] = React.useState('todas');
  const [search, setSearch] = React.useState('');
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [showModal, setShowModal] = React.useState(false);
  const [showFooter, setShowFooter] = React.useState(false);
  const [favorites, setFavorites] = React.useState(()=>JSON.parse(localStorage.getItem('fav')||"[]"));

  React.useEffect(() => {
    fetch('cards.json')
      .then(res => res.json())
      .then(data => setCardsData(data));
  }, []);

  React.useEffect(() => {
    localStorage.setItem('fav', JSON.stringify(favorites));
  }, [favorites]);

  React.useEffect(() => {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    });
  }, []);

  React.useEffect(() => {
    setShowFooter(true);
    const timer = setTimeout(() => setShowFooter(false), 5000);
    return () => clearTimeout(timer);
  }, []);

  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice;
  };

  let filteredCards = category === 'todas'
    ? cardsData
    : cardsData.filter(c => normalize(c.categoria) === category);

  if (search) {
    const words = normalize(search).split(' ').filter(Boolean);
    filteredCards = filteredCards.filter(c => {
      const content = normalize(`${c.titulo} ${c.cita} ${c.reflexion} ${c.versiculo}`);
      return words.every(w => content.includes(w));
    });
  }

  const heroCard = cardsData.find(c => c.categoria === 'evangelio');

  return e('div', { className: 'min-h-screen flex flex-col fade-in' },

    e('header', { className: 'flex justify-center items-center p-4 bg-gray-800 shadow' },
      e('h1', { className: 'text-2xl font-bold flex items-center gap-2' },
        e('i', { className: 'bi bi-book-fill text-yellow-400' }),
        'Palabra del Padre PRO',
        e('i', { className: 'bi bi-dove-fill' })
      )
    ),

    e('div', { className: 'mx-4 my-2' },
      e('input', {
        type: 'text',
        placeholder: 'Busca por palabra, versículo o tema...',
        value: search,
        onChange: (e) => setSearch(e.target.value),
        className: 'w-full p-3 rounded-xl text-gray-900 shadow'
      })
    ),

    installPrompt && e('div', { className: 'text-center my-2' },
      e('button', { onClick: handleInstall, className: 'install-btn' }, 'Instalar App 📲')
    ),

    heroCard && e(HeroCard, { ...heroCard }),

    e('div', { className: 'flex justify-center my-4' },
      e('a', { href:'https://m.me/tucanal', target:'_blank',
        className:'bg-blue-600 px-6 py-3 rounded hover:bg-blue-500 font-bold flex items-center gap-2' },
        e('i',{className:'bi bi-chat-dots'}),'Acompañamiento'
      )
    ),

    e(FloatingCategories, { categories, setCategory, category }),

    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4' },
      filteredCards.map((card, i) =>
        e(Card, { key: i, ...card, search, favorites, setFavorites })
      )
    ),

    e('button', { className: 'evangelizar-btn', onClick: () => setShowModal(true) },
      e('i', { className: 'bi bi-book-half' }), ' Evangelizar'
    ),

    showModal && e(Modal, { onClose: () => setShowModal(false) }),

    e('footer', { className: `footer ${showFooter ? 'show' : ''}` },
      '“Porque el que siembra generosamente, también segará generosamente.” — Lucas 6:38'
    )
  );
}

/* ⭐ CARD COMPLETA MEJORADA */
function Card({ titulo, versiculo, cita, reflexion, categoria, search, favorites, setFavorites }) {
  const [expanded, setExpanded] = React.useState(false);
  const isFav = favorites.includes(titulo);

  const toggleFav = (e) => {
    e.stopPropagation();
    setFavorites(f => isFav ? f.filter(x => x !== titulo) : [...f, titulo]);
  };

  return e('div', {
    className: `card-glass glow cursor-pointer ${expanded ? 'scale-105' : ''}`,
    onClick: () => setExpanded(!expanded)
  },

    e('div', { className: 'flex justify-between items-center' },
      e('h2', { className: 'text-lg font-bold' }, highlightText(titulo, search)),
      e('i', {
        className: `bi ${isFav ? 'bi-star-fill text-yellow-300' : 'bi-star'}`,
        onClick: toggleFav
      })
    ),

    e('h3', { className: 'text-sm' }, highlightText(versiculo, search)),

    e('div', {
      className: `overflow-hidden transition-all duration-500 ${
        expanded ? 'max-h-96 opacity-100 mt-2' : 'max-h-0 opacity-0'
      }`
    },
      e('p', null, highlightText(cita, search)),
      e('p', null, highlightText(reflexion, search)),

      e('div',{className:'flex gap-2 mt-2'},
        e('button',{className:'share-btn bg-green-600',
          onClick:(ev)=>{ev.stopPropagation();window.open('https://api.whatsapp.com/send?text='+encodeURIComponent(cita),'_blank')}
        },e('i',{className:'bi bi-whatsapp'}))
      )
    )
  );
}

/* RESTO ORIGINAL intacto */
function HeroCard({ titulo, versiculo, cita, reflexion }) {
  return e('div', { className: 'card-glass mx-4 my-4 glow' },
    e('h2', { className: 'text-2xl font-bold mb-2' }, titulo),
    e('h3', { className: 'text-lg mb-2' }, versiculo),
    e('p', { className: 'mb-2' }, cita),
    e('p', { className: 'text-sm mb-2' }, reflexion)
  );
}

function FloatingCategories({ categories, setCategory }) {
  const [open,setOpen]=React.useState(false);
  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{className:'floating-btn',onClick:()=>setOpen(!open)},'Categorías'),
    open && e('div',{className:'flex flex-col space-y-2 mt-2'},
      categories.map((cat,i)=>e('button',{
        key:i,
        onClick:()=>{setCategory(cat.id);setOpen(false);},
        className:`px-4 py-2 rounded ${cat.color}`
      },cat.label))
    )
  );
}

function Modal({ onClose }) {
  return e('div', { className:'fixed inset-0 bg-black/50 flex justify-center items-center', onClick:onClose },
    e('div', { className:'bg-white text-gray-900 p-4 rounded shadow', onClick:e=>e.stopPropagation() },
      e('h2', null, 'Evangelizar'),
      e('button', { onClick:onClose }, 'Cerrar')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
