<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta de Pascua</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom, #fff8e1, #fffef5); /* Blanco-dorado */
    }
    #tarjeta-container {
      position: relative;
      display: inline-block;
      max-width: 90%;
      margin: auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    #nombre-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      font-weight: bold;
      color: #FFD700; /* dorado */
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
      text-align: center;
      pointer-events: none;
      width: 80%;
      word-wrap: break-word;
    }
    input::placeholder {
      color: #b28e4a;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

  <h1 class="text-4xl font-bold text-center mb-6 text-gold-500">Felicita esta Pascua</h1>

  <div class="mb-4 w-full max-w-md">
    <input id="nombre-input" type="text" class="form-control form-control-lg text-center" placeholder="Escribe tu nombre aquí">
  </div>

  <div id="tarjeta-container" class="mb-4">
    <img src="/pascua.png" id="tarjeta-img" class="img-fluid rounded">
    <div id="nombre-overlay">Tu Nombre</div>
  </div>

  <div class="mb-4 flex flex-col items-center gap-3">
    <button id="apoya-btn" class="btn btn-warning w-48 font-bold">Apoya y Descarga</button>
    <button id="descarga-btn" class="btn btn-primary w-48 font-bold hidden">Descargar Tarjeta</button>
  </div>

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const nombreInput = document.getElementById('nombre-input');
    const nombreOverlay = document.getElementById('nombre-overlay');
    const descargaBtn = document.getElementById('descarga-btn');
    const apoyaBtn = document.getElementById('apoya-btn');

    // Actualiza el texto en la tarjeta automáticamente
    nombreInput.addEventListener('input', () => {
      nombreOverlay.textContent = nombreInput.value || "Tu Nombre";
    });

    // Click en Apoya y Descarga
    apoyaBtn.addEventListener('click', () => {
      window.open('TU_LINK_DE_PAYPAL_AQUI', '_blank');

      // Cambiar a botón de descargar después de 5 segundos
      setTimeout(() => {
        apoyaBtn.classList.add('hidden');
        descargaBtn.classList.remove('hidden');
      }, 5000);
    });

    // Descargar la tarjeta como imagen
    descargaBtn.addEventListener('click', () => {
      const tarjetaContainer = document.getElementById('tarjeta-container');
      html2canvas(tarjetaContainer).then(canvas => {
        const link = document.createElement('a');
        link.download = 'tarjeta-pascua.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>

</body>
</html>
