<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre - Libre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}
.card-glass {
  backdrop-filter: blur(10px);
  background-color: rgba(255,255,255,0.1);
  border-radius: 0.75rem;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1rem;
  cursor: pointer;
  transition: transform 0.3s;
}
.card-glass:hover { transform: scale(1.03); }
.share-btn { 
  width: 36px; height: 36px; 
  display:flex; align-items:center; justify-content:center; 
  border-radius:50%; 
  transition: transform 0.2s; 
  border: 1px solid rgba(255,255,255,0.4); 
}
.share-btn:hover { transform: scale(1.2); }
.modo-oracion {
  position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  color:white;
  padding:2rem;
  z-index:1000;
  overflow-y: auto;
}
.modo-oracion textarea {
  width: 100%;
  max-width:500px;
  height:120px;
  border-radius:0.5rem;
  border:none;
  padding:1rem;
  margin:1rem 0;
  resize:none;
  color:black;
}
.search-input {
  max-width:400px;
  margin: 0 auto 1rem auto;
  padding:0.5rem 1rem;
  border-radius:0.5rem;
  border:none;
}
footer {
  background: rgba(0,0,0,0.7);
  text-align:center;
  padding:1rem;
  margin-top:auto;
  color:white;
}
</style>
</head>
<body class="text-white">

<div id="root"></div>

<script>
const e = React.createElement;

const cardsData = [
  {categoria:'paz', titulo:'No tengas miedo', versiculo:'Filipenses 4:6-7', cita:'No se inquieten por nada; presenten sus peticiones a Dios en oración y súplica, con acción de gracias. Y la paz de Dios cuidará sus corazones y pensamientos.', reflexion:'Confía en Dios y deja tus preocupaciones en sus manos.', premium:false},
  {categoria:'amor', titulo:'Ama al prójimo', versiculo:'1 Juan 3:18', cita:'Hijos míos, no amemos de palabra ni de lengua, sino con hechos y en verdad.', reflexion:'El amor se demuestra con acciones.', premium:false},
  {categoria:'devocion', titulo:'Oración a San Miguel', versiculo:'San Miguel Arcángel', cita:'San Miguel Arcángel, defiéndenos en la batalla; sé nuestro amparo contra la maldad y las asechanzas del demonio.', reflexion:'Lleva esta oración en tu bolsillo.', premium:false},
  {categoria:'fortaleza', titulo:'Fortaleza Premium', versiculo:'Isaías 41:10', cita:'No temas, porque yo estoy contigo; no te angusties, porque yo soy tu Dios. Te fortaleceré y te ayudaré.', reflexion:'Confía en la fuerza de Dios.', premium:true},
  {categoria:'inspiracion', titulo:'Valentía Premium', versiculo:'Josué 1:9', cita:'Sé fuerte y valiente; no temas, porque el Señor tu Dios estará contigo dondequiera que vayas.', reflexion:'Dios está contigo en cada desafío.', premium:true}
];

const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-600/50'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/30'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/30'},
  {id:'inspiracion', label:'Inspiración', icon:'bi-lightning-fill', color:'bg-green-400/30'},
  {id:'amor', label:'Amor al prójimo', icon:'bi-heart-fill', color:'bg-yellow-300/30'},
  {id:'fe', label:'Fe y Confianza', icon:'bi-star-fill', color:'bg-purple-400/30'},
  {id:'devocion', label:'Devoción', icon:'bi-book-fill', color:'bg-pink-400/30'}
];

function normalize(str){return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();}

function App() {
  const [category, setCategory] = React.useState('todas');
  const [oracion, setOracion] = React.useState(false);
  const [cardIndex, setCardIndex] = React.useState(0);
  const [contadorOraciones, setContadorOraciones] = React.useState(0);
  const [searchTerm, setSearchTerm] = React.useState('');
  const [diario, setDiario] = React.useState([]);

  const filteredCards = cardsData
    .filter(c=>category==='todas' || normalize(c.categoria)===category)
    .filter(c=>c.titulo.toLowerCase().includes(searchTerm.toLowerCase()) || c.cita.toLowerCase().includes(searchTerm.toLowerCase()));

  const startOracion = (index=0) => {
    setCardIndex(index);
    setOracion(true);
  };

  const nextCard = (nota) => {
    if(nota) setDiario(prev => [...prev, {card:filteredCards[cardIndex], nota}]);
    setContadorOraciones(prev => prev + 1);
    if(cardIndex < filteredCards.length - 1) {
      setCardIndex(cardIndex + 1);
    } else {
      alert('Has completado tu oración del día 🙏');
      setOracion(false);
    }
  };

  return e('div',{className:'min-h-screen flex flex-col'},
    e('header',{className:'flex flex-col justify-center items-center p-4 bg-gray-800 shadow relative'},
      e('h1',{className:'text-2xl font-bold flex items-center gap-2 mb-2'}, 
        e('i',{className:'bi bi-book-fill text-yellow-400'}), 'Palabra del Padre - Libre'
      ),
      e('input',{className:'search-input text-black', placeholder:'Buscar palabra de Dios...', value:searchTerm, onChange:e=>setSearchTerm(e.target.value)})
    ),
    e('div',{className:'text-center mt-2 space-x-2'},
      e('button',{className:'flex items-center bg-purple-600 px-6 py-3 rounded-full hover:bg-purple-500 mx-auto text-lg font-semibold', onClick:()=>startOracion(0)},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Modo Oración'
      )
    ),
    e(FloatingCategories,{categories, setCategory, category}),
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card,startOracion,index:i}))
    ),
    oracion && e(ModoOracionPremium,{card:filteredCards[cardIndex], nextCard}),
    e('footer', null, 
      e('p',null,'Si estas palabras te han inspirado, considera apoyar nuestra misión para seguir compartiendo la Palabra de Dios.'),
      e('button',{className:'mt-2 bg-yellow-400 text-gray-900 px-6 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')}, 'Donar')
    )
  );
}

function Card({titulo, versiculo, cita, reflexion, premium, startOracion, index}) {
  const [expanded,setExpanded] = React.useState(false);
  const cardRef = React.useRef();

  const shareCard = (platform)=>{
    html2canvas(cardRef.current).then(canvas=>{
      canvas.toBlob(blob=>{
        const file = new File([blob], 'card.png', {type:'image/png'});
        const url = URL.createObjectURL(file);
        if(platform==='whatsapp'){
          const text = encodeURIComponent(reflexion + ' - ' + window.location.href);
          window.open(`https://api.whatsapp.com/send?text=${text}`,'_blank');
        } else if(platform==='facebook'){
          const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`;
          window.open(fbUrl,'_blank');
        } else if(platform==='instagram'){
          alert('Instagram no permite compartir imagen directamente desde web. Descarga la imagen y compártela.');
          window.open(url,'_blank');
        }
      });
    });
  };

  return e('div',{ref:cardRef, className:'card-glass shadow p-4', onClick:()=>setExpanded(!expanded)},
    e('h2',{className:'text-lg font-bold flex items-center gap-1'}, titulo, premium && e('span',{className:'ml-2 text-yellow-400'},'⭐')),
    e('h3',{className:'text-sm text-gray-200'},versiculo),
    e('div',{className:`overflow-hidden transition-all duration-500 ${expanded?'max-h-96 opacity-100 mt-2':'max-h-0 opacity-0'}`},
      e('p',{className:'italic mb-2'},`"${cita}"`),
      e('p',null,reflexion),
      e('div',{className:'flex space-x-2 mt-2'},
        e('button',{className:'share-btn bg-blue-700 hover:bg-blue-600', onClick:(e)=>{e.stopPropagation(); shareCard('facebook');}},
          e('i',{className:'bi bi-facebook text-white'})
        ),
        e('button',{className:'share-btn bg-pink-600 hover:bg-pink-500', onClick:(e)=>{e.stopPropagation(); shareCard('instagram');}},
          e('i',{className:'bi bi-instagram text-white'})
        ),
        e('button',{className:'share-btn bg-green-600 hover:bg-green-500', onClick:(e)=>{e.stopPropagation(); shareCard('whatsapp');}},
          e('i',{className:'bi bi-whatsapp text-white'})
        ),
        e('button',{className:'ml-auto px-2 py-1 bg-white text-gray-900 rounded hover:bg-gray-200 text-sm', onClick:(e)=>{e.stopPropagation(); startOracion(index);}}, 'Orar')
      )
    )
  );
}

function FloatingCategories({categories,setCategory,category}){
  const [open,setOpen] = React.useState(false);
  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{className:'bg-white/10 backdrop-blur-lg border border-white/20 text-white px-4 py-3 rounded-full shadow hover:scale-110 transition', onClick:()=>setOpen(!open)},
      e('i',{className:`bi ${open ? 'bi-x-lg' : 'bi-list'} text-white/80 text-lg`}),'Categorías'
    ),
    e('div',{className:`flex flex-col space-y-2 transition-all duration-300 origin-bottom-right ${open ? 'opacity-100 scale-100' : 'opacity-0 scale-75 pointer-events-none'}`},
      categories.map((cat,i)=>
        e('button',{key:i,onClick:()=>{setCategory(cat.id); setOpen(false);}, className:`flex items-center gap-2 px-4 py-2 rounded-full backdrop-blur-md border border-white/20 ${cat.color} text-white/90 shadow hover:scale-105 hover:bg-white/20 transition-all duration-200`},
          e('i',{className:`${cat.icon} text-white/80`}),
          cat.label
        )
      )
    )
  );
}

function ModoOracionPremium({card,nextCard}){
  const [nota, setNota] = React.useState('');

  return e('div',{className:'modo-oracion'},
    e('h2',{className:'text-2xl font-bold mb-2'}, card.titulo),
    e('p',{className:'text-lg mb-2'}, card.versiculo),
    e('p',{className:'italic mb-4'}, `"${card.cita}"`),
    e('p',{className:'mb-4'}, card.reflexion),
    e('textarea',{placeholder:'Escribe aquí tu aprendizaje o reflexión...', value:nota, onChange:e=>setNota(e.target.value)}),
    e('div',{className:'flex space-x-4 mt-4'},
      e('button',{className:'bg-green-600 px-4 py-2 rounded hover:bg-green-500', onClick:()=>nextCard(nota)}, 'Siguiente'),
      e('button',{className:'bg-yellow-400 px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')}, 'Donar')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
