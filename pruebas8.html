<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(to bottom, #2a1e3b, #3b1f5f);
  font-family: sans-serif;
}
.card-glass {
  backdrop-filter: blur(10px);
  background-color: rgba(255,255,255,0.1);
  border-radius: 0.75rem;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 1rem;
  transition: all 0.3s;
}
.card-footer button {
  background-color: rgba(255,255,255,0.2);
  border-radius: 0.5rem;
  padding: 0.3rem 0.5rem;
  margin-top: 0.5rem;
  transition: background 0.2s;
}
.card-footer button:hover { background-color: rgba(255,255,255,0.4); }
.share-btn { 
  width: 36px; height: 36px; 
  display:flex; align-items:center; justify-content:center; 
  border-radius:50%; 
  transition: transform 0.2s; 
  border: 1px solid rgba(255,255,255,0.4); 
}
.share-btn:hover { transform: scale(1.2); }
.highlight { background-color: yellow; color: black; font-weight: bold; }
</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

const categories = [
  {id:'todas', label:'Todas', icon:'bi-list', color:'bg-indigo-600/50'},
  {id:'paz', label:'Paz', icon:'bi-dove-fill', color:'bg-blue-400/30'},
  {id:'fortaleza', label:'Fortaleza', icon:'bi-shield-fill', color:'bg-red-400/30'},
  {id:'inspiracion', label:'Inspiración', icon:'bi-lightning-fill', color:'bg-green-400/30'},
  {id:'amor', label:'Amor al prójimo', icon:'bi-heart-fill', color:'bg-yellow-300/30'},
  {id:'fe', label:'Fe y Confianza', icon:'bi-star-fill', color:'bg-purple-400/30'},
  {id:'devocion', label:'Devoción', icon:'bi-book-fill', color:'bg-pink-400/30'},
  {id:'evangelio', label:'Evangelio', icon:'bi-calendar-event-fill', color:'bg-orange-400/30'}
];

function normalize(str){
  return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function highlightText(text, search){
  if(!search) return text;
  const words = normalize(search).split(' ').filter(Boolean);
  let result = text || '';
  words.forEach(word=>{
    const re = new RegExp(`(${word})`,'gi');
    result = result.replace(re,'<span class="highlight">$1</span>');
  });
  return e('span',{dangerouslySetInnerHTML:{__html:result}});
}

function App() {
  const [cardsData, setCardsData] = React.useState([]);
  const [category, setCategory] = React.useState('todas');
  const [search, setSearch] = React.useState('');
  const [installPrompt, setInstallPrompt] = React.useState(null);

  React.useEffect(()=>{
    fetch('cards.json')
      .then(res => res.json())
      .then(data => setCardsData(data))
      .catch(err => console.error('Error cargando JSON', err));
  },[]);

  React.useEffect(()=>{
    window.addEventListener('beforeinstallprompt', (e)=>{
      e.preventDefault();
      setInstallPrompt(e);
    });
  },[]);

  const handleInstall = async () => {
    if(!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice;
  };

  let filteredCards = category==='todas'
    ? cardsData
    : cardsData.filter(c=>normalize(c.categoria)===category);

  if(search){
    const words = normalize(search).split(' ').filter(Boolean);
    filteredCards = filteredCards.filter(c=>{
      const content = normalize(`${c.titulo} ${c.cita} ${c.reflexion} ${c.versiculo}`);
      return words.every(w => content.includes(w));
    });
  }

  const evangelioCards = cardsData.filter(c=>normalize(c.categoria)==='evangelio');

  return e('div',{className:'min-h-screen flex flex-col'},

    e('header',{className:'flex justify-center items-center p-4 bg-gray-800 shadow relative'},
      e('h1',{className:'text-2xl font-bold flex items-center gap-2'}, 
        e('i',{className:'bi bi-book-fill text-yellow-400'}),
        'Palabra del Padre',
        e('i',{className:'bi bi-dove-fill text-white'})
      )
    ),

    e('div',{className:'mx-4 my-2'},
      e('input',{
        type:'text',
        placeholder:'Busca por palabra, versículo o tema...',
        value: search,
        onChange: (e)=>setSearch(e.target.value),
        className:'w-full p-3 rounded-xl text-gray-900'
      })
    ),

    // Botón instalar
    installPrompt && e('div',{className:'text-center my-2'},
      e('button',{
        onClick: handleInstall,
        className:'bg-green-500 px-4 py-2 rounded shadow hover:bg-green-400'
      }, 'Instalar App 📲')
    ),

    // Carousel evangelio
    e('div',{className:'mx-4 my-2 overflow-x-auto flex space-x-4'},
      evangelioCards.map(card =>
        e('div',{key:card.id, className:'card-glass min-w-[250px] flex-shrink-0'},
          e('h3',{className:'font-bold text-lg'}, card.titulo),
          e('p',null, card.versiculo),
          e('p',null, card.cita),
          e('p',null, card.reflexion)
        )
      )
    ),

    e(FloatingCategories,{categories, setCategory, category}),

    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filteredCards.map(card => e(Card,{key:card.id,...card, search}))
    ),

    e('footer',{className:'text-center py-4 text-gray-300'},
      'Gracias por apoyar esta herramienta de crecimiento espiritual.'
    )
  );
}

function Card({id, titulo, versiculo, cita, reflexion, categoria, search}) {
  const [expanded,setExpanded] = React.useState(false);
  const catObj = categories.find(c=>normalize(c.id)===normalize(categoria)) || {color:'bg-gray-600/30'};

  const shareCard = (platform)=>{
    const text = `${cita}\n${window.location.href}`;
    if(platform==='whatsapp'){
      window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`,'_blank');
    } else if(platform==='facebook'){
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${encodeURIComponent(cita)}`,'_blank');
    }
  };

  return e('div',{
    className:`card-glass shadow transform hover:scale-105 cursor-pointer ${catObj.color}`,
    onClick:()=>setExpanded(!expanded)
  },
    e('h2',{className:'text-lg font-bold'}, highlightText(titulo, search)),
    e('h3',{className:'text-sm'}, highlightText(versiculo, search)),
    e('div',{className:expanded?'mt-2':'hidden'},
      e('p',null, highlightText(cita, search)),
      e('p',null, highlightText(reflexion, search))
    ),
    e('div',{className:'flex gap-2 mt-2 card-footer'},
      e('button',{onClick:()=>shareCard('whatsapp'), className:'share-btn'}, e('i',{className:'bi bi-whatsapp'})),
      e('button',{onClick:()=>shareCard('facebook'), className:'share-btn'}, e('i',{className:'bi bi-facebook'})),
      e('button',{className:'ml-auto'}, 'Mi Diario Espiritual')
    )
  );
}

function FloatingCategories({categories,setCategory,category}){
  const [open,setOpen] = React.useState(false);

  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{
      className:'bg-white/10 text-white px-4 py-3 rounded-full mb-2 flex items-center gap-2',
      onClick:()=>setOpen(!open)
    }, e('i',{className:'bi bi-list'}), 'Palabra'),
    open && e('div',{className:'flex flex-col space-y-2'},
      categories.map((cat,i)=>
        e('button',{
          key:i,
          onClick:()=>{setCategory(cat.id); setOpen(false);},
          className:`px-4 py-2 rounded ${cat.color} flex items-center gap-2`
        }, e('i',{className:cat.icon}), cat.label)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
