<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Versículos</title>
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
    }
    /* Cards cristal */
    .card-cristal {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.2);
      border-radius: 1rem;
      margin-bottom: 1rem;
      transition: transform 0.3s;
    }
    .card-cristal:hover {
      transform: scale(1.03);
    }
    .card-body {
      color: #111;
    }
    /* Botones flotantes */
    .btn-flotante {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000;
      opacity: 0.85;
    }
    /* Botón Palabra azul */
    #btnPalabra {
      background-color: #0d6efd;
      color: white;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    /* Categorias flotantes */
    .category-btn {
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }
    /* Hero card */
    .hero-card {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.25);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    /* Separador consejo */
    .separador {
      border-top: 1px solid rgba(0,0,0,0.2);
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

<div class="container py-3">
  <!-- Buscador -->
  <div class="mb-3">
    <input type="text" id="buscador" class="form-control" placeholder="Buscar por título o versículo...">
  </div>

  <!-- Hero Card -->
  <div class="hero-card">
    <h2>Bienvenido</h2>
    <p>Encuentra inspiración diaria con la Palabra de Dios</p>
    <button class="btn btn-primary" id="btnAcompanamiento">Acompañamiento</button>
    <button class="btn btn-secondary" id="btnEvangelizar">Evangelizar</button>
  </div>

  <!-- Cards container -->
  <div id="cardsContainer" class="row"></div>
</div>

<!-- Botón flotante Palabra -->
<button id="btnPalabra" class="btn-flotante">📖</button>

<!-- Categorías flotantes -->
<div class="position-fixed end-0 me-3 bottom-100 d-flex flex-column">
  <button class="btn btn-outline-primary category-btn" data-categoria="paz">Paz</button>
  <button class="btn btn-outline-success category-btn" data-categoria="fortaleza">Fortaleza</button>
  <button class="btn btn-outline-warning category-btn" data-categoria="inspiracion">Inspiración</button>
  <button class="btn btn-outline-danger category-btn" data-categoria="amor">Amor</button>
  <button class="btn btn-outline-info category-btn" data-categoria="fe">Fe</button>
  <button class="btn btn-outline-secondary category-btn" data-categoria="devocion">Devoción</button>
  <button class="btn btn-outline-dark category-btn" data-categoria="evangelio">Evangelio</button>
  <button class="btn btn-outline-secondary category-btn" data-categoria="todas">Todas</button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
const cardsData = [
  {"id":"paz1","categoria":"paz","titulo":"No tengas miedo","versiculo":"Filipenses 4:6-7","cita":"“No se inquieten por nada; más bien, presenten sus peticiones a Dios en toda oración y súplica, acompañadas de acción de gracias. Y la paz de Dios, que supera todo entendimiento, cuidará sus corazones y sus pensamientos en Cristo Jesús.”","reflexion":"Confía en Dios y deja tus preocupaciones en sus manos."},
  {"id":"fortaleza1","categoria":"fortaleza","titulo":"Resiste la tentación","versiculo":"1 Corintios 10:13","cita":"“No les ha sobrevenido ninguna tentación que no sea común a los hombres; pero Dios es fiel, y no permitirá que sean tentados más allá de lo que puedan soportar.”","reflexion":"Dios te da la fuerza para superar cualquier tentación."},
  {"id":"inspiracion1","categoria":"inspiracion","titulo":"Actúa con bondad","versiculo":"Gálatas 6:9","cita":"“No nos cansemos de hacer el bien, porque a su tiempo cosecharemos si no desmayamos.”","reflexion":"Cada acto de bondad te acerca más a Dios."},
  {"id":"amor1","categoria":"amor","titulo":"Ayuda a otros","versiculo":"Mateo 25:40","cita":"“Les aseguro que todo lo que hicieron por uno de estos mis hermanos más pequeños, a mí me lo hicieron.”","reflexion":"Hacer caridad es servir a Dios directamente."},
  {"id":"fe1","categoria":"fe","titulo":"Confía en el Señor","versiculo":"Proverbios 3:5-6","cita":"“Confía en el Señor con todo tu corazón y no te apoyes en tu propia prudencia. Reconócelo en todos tus caminos, y Él enderezará tus senderos.”","reflexion":"Ríndete a Dios y Él guiará tus caminos."}
  // ... puedes agregar todas las demás aquí
];

const cardsContainer = document.getElementById('cardsContainer');
const buscador = document.getElementById('buscador');

function renderCards(data){
  cardsContainer.innerHTML = '';
  data.forEach(card => {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'col-12 col-md-6 col-lg-4';
    cardDiv.innerHTML = `
      <div class="card card-cristal">
        <div class="card-body" style="border-left: 5px solid ${getColor(card.categoria)};">
          <h5 class="card-title">${card.titulo}</h5>
          <p class="card-text">${card.cita}</p>
          <p class="text-muted mt-2">${card.versiculo}</p>
          <div class="separador"></div>
          <p>${card.reflexion}</p>
          <div class="d-flex justify-content-between mt-2">
            <button class="btn btn-sm btn-outline-secondary btn-diario">Mi Diario</button>
            <div class="btn-group">
              <button class="btn btn-sm btn-outline-primary" onclick="shareWhatsApp('${encodeURIComponent(card.cita + ' - ' + card.versiculo + ' ' + location.href)}')">WhatsApp</button>
              <button class="btn btn-sm btn-outline-primary" onclick="shareFacebook('${encodeURIComponent(card.cita + ' - ' + card.versiculo + ' ' + location.href)}')">Facebook</button>
            </div>
          </div>
        </div>
      </div>
    `;
    cardsContainer.appendChild(cardDiv);
  });
}

function getColor(categoria){
  switch(categoria){
    case 'paz': return '#00bcd4';
    case 'fortaleza': return '#4caf50';
    case 'inspiracion': return '#ff9800';
    case 'amor': return '#f44336';
    case 'fe': return '#2196f3';
    case 'devocion': return '#9e9e9e';
    case 'evangelio': return '#673ab7';
    default: return '#ccc';
  }
}

// Filtrado por búsqueda
buscador.addEventListener('input', () => {
  const term = buscador.value.toLowerCase();
  const filtered = cardsData.filter(c => c.titulo.toLowerCase().includes(term) || c.versiculo.toLowerCase().includes(term));
  renderCards(filtered);
});

// Categorías flotantes
document.querySelectorAll('.category-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.getAttribute('data-categoria');
    if(cat === 'todas'){
      renderCards(cardsData);
    } else {
      renderCards(cardsData.filter(c => c.categoria === cat));
    }
  });
});

// Compartir
function shareWhatsApp(text){
  window.open(`https://wa.me/?text=${text}`, '_blank');
}
function shareFacebook(text){
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}&quote=${text}`, '_blank');
}

// Inicial
renderCards(cardsData);
</script>
</body>
</html>
