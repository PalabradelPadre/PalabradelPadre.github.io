<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajes Espirituales</title>

<!-- TailwindCSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SwiperJS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-element-bundle.min.js"></script>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
  body {
    background: linear-gradient(135deg, #fef3c7, #d9f99d);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
  }

  .card {
    border-radius: 2rem;
    overflow: hidden;
    position: relative;
    text-align: center;
    transition: transform 0.5s ease, box-shadow 0.5s ease;
    perspective: 1000px;
  }

  .card-inner {
    border-radius: 2rem;
    background: white;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transform-style: preserve-3d;
  }

  .card:hover .card-inner {
    transform: rotateX(5deg) rotateY(5deg) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .card img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  .card h2 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #111827;
    margin-bottom: 0.5rem;
  }

  .card p {
    font-size: 1rem;
    color: #374151;
    margin-bottom: 1rem;
  }

  .share a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 9999px;
    font-weight: 600;
    color: white;
    text-decoration: none;
    transition: background 0.3s;
  }

  .whatsapp { background-color: #25D366; }
  .whatsapp:hover { background-color: #1ebe5d; }

  .facebook { background-color: #1877F2; }
  .facebook:hover { background-color: #145dbf; }

  /* Logo fijo */
  .logo {
    position: fixed;
    top: 1rem;
    left: 1rem;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    z-index: 50;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<!-- Logo -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Jesus_Christ_logo.svg/1200px-Jesus_Christ_logo.svg.png" class="logo" alt="Logo">

<!-- Carrusel -->
<main class="w-full max-w-sm h-[90vh] p-4">
  <swiper-container direction="vertical" loop="true" mousewheel="true" grab-cursor="true" slides-per-view="auto" class="h-full">
    <template class="swiper-slide">
      <div class="card">
        <div class="card-inner">
          <img src="" alt="">
          <h2></h2>
          <p></p>
          <div class="share flex gap-3 w-full justify-center">
            <a href="#" target="_blank" class="whatsapp"><i class="bi bi-whatsapp"></i> WhatsApp</a>
            <a href="#" target="_blank" class="facebook"><i class="bi bi-facebook"></i> Facebook</a>
          </div>
        </div>
      </div>
    </template>
  </swiper-container>
</main>

<script>
  const messages = [
    {
      title: "Yo soy el pan de vida",
      text: "Jesús les dijo: «Yo soy el pan de vida; el que venga a mí no tendrá hambre, y el que cree en mí no tendrá sed jamás.» - Juan 6,35",
      img: "https://images.pexels.com/photos/1447179/pexels-photo-1447179.jpeg",
      whatsapp: "https://api.whatsapp.com/send?text=Yo%20soy%20el%20pan%20de%20vida%20-%20Juan%206:35",
      facebook: "https://www.facebook.com/sharer/sharer.php?u=https://example.com"
    },
    {
      title: "Yo soy la luz del mundo",
      text: "Jesús dijo: «Yo soy la luz del mundo; el que me sigue no caminará en tinieblas, sino que tendrá la luz de la vida.» - Juan 8,12",
      img: "https://images.pexels.com/photos/2475994/pexels-photo-2475994.jpeg",
      whatsapp: "https://api.whatsapp.com/send?text=Yo%20soy%20la%20luz%20del%20mundo%20-%20Juan%208:12",
      facebook: "https://www.facebook.com/sharer/sharer.php?u=https://example.com"
    },
    {
      title: "Yo soy el buen pastor",
      text: "Jesús dijo: «Yo soy el buen pastor. El buen pastor da la vida por sus ovejas.» - Juan 10,11",
      img: "https://images.pexels.com/photos/691525/pexels-photo-691525.jpeg",
      whatsapp: "https://api.whatsapp.com/send?text=Yo%20soy%20el%20buen%20pastor%20-%20Juan%2010:11",
      facebook: "https://www.facebook.com/sharer/sharer.php?u=https://example.com"
    },
    {
      title: "Yo soy la resurrección y la vida",
      text: "Jesús dijo: «Yo soy la resurrección y la vida; el que cree en mí, aunque muera, vivirá.» - Juan 11,25",
      img: "https://images.pexels.com/photos/2825618/pexels-photo-2825618.jpeg",
      whatsapp: "https://api.whatsapp.com/send?text=Yo%20soy%20la%20resurrección%20y%20la%20vida%20-%20Juan%2011:25",
      facebook: "https://www.facebook.com/sharer/sharer.php?u=https://example.com"
    }
  ];

  const swiperContainer = document.querySelector("swiper-container");
  const template = document.querySelector("template");

  messages.forEach(msg => {
    const clone = template.content.cloneNode(true);
    const card = clone.querySelector(".card");
    card.querySelector("img").src = msg.img;
    card.querySelector("img").alt = msg.title;
    card.querySelector("h2").textContent = msg.title;
    card.querySelector("p").textContent = msg.text;
    card.querySelectorAll("a")[0].href = msg.whatsapp;
    card.querySelectorAll("a")[1].href = msg.facebook;
    swiperContainer.appendChild(clone);
  });
</script>

</body>
</html>
