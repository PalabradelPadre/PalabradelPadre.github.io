<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra del Padre</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { background: linear-gradient(to bottom, #2a1e3b, #3b1f5f); font-family: sans-serif; overflow-x:hidden; }
.card-glass { backdrop-filter: blur(10px); background-color: rgba(255,255,255,0.1); border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.2); padding: 1rem; cursor:pointer; transition: transform 0.3s; }
.card-glass:hover { transform: scale(1.03); }
.share-btn { width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform 0.2s;border:1px solid rgba(255,255,255,0.4); }
.share-btn:hover { transform: scale(1.2); }
.modo-oracion { position:fixed;top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; padding:2rem; z-index:1000; overflow-y:scroll; scroll-snap-type: y mandatory; }
.modo-card { min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; scroll-snap-align: start; width:100%; max-width:600px; text-align:center; padding:1rem; }
.modo-card textarea { width:100%; height:120px; border-radius:0.5rem; border:none; padding:1rem; margin-top:1rem; resize:none; color:black; }
.menu { display:flex; gap:1rem; margin-left:1rem; }
.menu a { color:white; text-decoration:none; font-weight:500; }
.search-input { max-width:400px; margin: 0 auto 1rem auto; padding:0.5rem 1rem; border-radius:0.5rem; border:none; }
</style>
</head>
<body class="text-white">

<div id="root"></div>

<script>
const e = React.createElement;

// --- Datos de cards ---
const cardsData = [ /* Tus 28 cards originales */ ];

const categories = [ /* Tus categorías originales */ ];

function normalize(str){return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();}

function App() {
  const [category, setCategory] = React.useState('todas');
  const [modoOracion, setModoOracion] = React.useState(false);
  const [searchTerm, setSearchTerm] = React.useState('');

  const filteredCards = cardsData
    .filter(c=>category==='todas' || normalize(c.categoria)===category)
    .filter(c=>c.titulo.toLowerCase().includes(searchTerm.toLowerCase()) || c.cita.toLowerCase().includes(searchTerm.toLowerCase()));

  return e('div',{className:'min-h-screen flex flex-col'},
    e('header',{className:'flex justify-between items-center p-4 bg-gray-800 shadow'},
      e('div',{className:'flex items-center'},
        e('img',{src:'https://upload.wikimedia.org/wikipedia/commons/3/32/Book_icon.svg', alt:'Logo', className:'w-8 h-8 mr-2'}),
        e('h1',{className:'text-2xl font-bold'},'Palabra del Padre')
      ),
      e('nav',{className:'menu'},
        e('a',{href:'https://www.vatican.va/archive/horarion'},'Liturgia'),
        e('a',{href:'https://www.vatican.va/archive/catechism'},'Catecismo'),
        e('a',{href:'https://www.vatican.va/archive/bible'},'Biblia')
      )
    ),
    e('input',{className:'search-input text-black', placeholder:'Buscar palabra de Dios...', value:searchTerm, onChange:e=>setSearchTerm(e.target.value)}),
    e('div',{className:'text-center mt-2 space-x-2'},
      e('button',{className:'flex items-center bg-purple-600 px-4 py-2 rounded hover:bg-purple-500 mx-auto', onClick:()=>window.open('https://m.me/tuPaginaMessenger','_blank')},
        e('i',{className:'bi bi-chat-left-text mr-2'}),'Acompañamiento'
      ),
      e('button',{className:'flex items-center bg-green-600 px-4 py-2 rounded hover:bg-green-500 mx-auto', onClick:()=>setModoOracion(true)},
        e('i',{className:'bi bi-heart-text mr-2'}),'Modo Oración'
      )
    ),
    e(FloatingCategories,{categories, setCategory, category}),
    e('div',{className:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4'},
      filteredCards.map((card,i)=>e(Card,{key:i,...card}))
    ),
    e('div',{className:'text-center my-4'},
      e('button',{className:'flex items-center bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')},
        e('i',{className:'bi bi-heart-fill mr-2'}),'Colaborar'
      )
    ),
    modoOracion && e(ModoOracion,{cards:filteredCards, close:()=>setModoOracion(false)})
  );
}

function Card({titulo, versiculo, cita, reflexion}) {
  return e('div',{className:'card-glass shadow p-4'},
    e('h2',{className:'text-lg font-bold flex items-center gap-1'}, titulo),
    e('h3',{className:'text-sm text-gray-200'},versiculo),
    e('p',{className:'italic mt-2'}, `"${cita}"`),
    e('p',null,reflexion)
  );
}

function FloatingCategories({categories,setCategory,category}){
  const [open,setOpen] = React.useState(false);
  return e('div',{className:'fixed bottom-6 right-6 z-50 flex flex-col items-end'},
    e('button',{className:'bg-white/10 backdrop-blur-lg border border-white/20 text-white px-4 py-3 rounded-full shadow hover:scale-110 transition', onClick:()=>setOpen(!open)},
      e('i',{className:`bi ${open ? 'bi-x-lg' : 'bi-list'} text-white/80 text-lg`}),
      'Categorías'
    ),
    e('div',{className:`flex flex-col space-y-2 transition-all duration-300 origin-bottom-right ${open ? 'opacity-100 scale-100' : 'opacity-0 scale-75 pointer-events-none'}`},
      categories.map((cat,i)=>e('button',{key:i,onClick:()=>{setCategory(cat.id); setOpen(false);}, className:`flex items-center gap-2 px-4 py-2 rounded-full backdrop-blur-md border border-white/20 ${cat.color} text-white/90 shadow hover:scale-105 hover:bg-white/20 transition-all duration-200`},
        e('i',{className:`${cat.icon} text-white/80`}), cat.label
      ))
    )
  );
}

function ModoOracion({cards, close}){
  return e('div',{className:'modo-oracion'},
    cards.map((card,i)=>e('div',{key:i,className:'modo-card'},
      e('h2',{className:'text-3xl font-bold mb-2'}, card.titulo),
      e('p',{className:'text-lg mb-2'}, card.versiculo),
      e('p',{className:'italic mb-4'}, `"${card.cita}"`),
      e('p',{className:'mb-4'}, card.reflexion),
      e('textarea',{placeholder:'Escribe aquí tu reflexión...'}),
      e('div',{className:'flex space-x-4 mt-4 justify-center'},
        e('button',{className:'bg-yellow-400 px-4 py-2 rounded hover:bg-yellow-300', onClick:()=>window.open('https://www.paypal.com/donate?hosted_button_id=XXXXX','_blank')}, 'Colaborar'),
        e('button',{className:'bg-red-600 px-4 py-2 rounded hover:bg-red-500', onClick:close}, 'Cerrar')
      )
    ))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
